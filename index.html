<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>THE PIT — 六人闘技場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Noto+Serif+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --obsidian:#0b0908;
    --stone:#1c1613;
    --ember:#ff6a2b;
    --ember-dim:#8a3a17;
    --arcane:#9b6bff;
    --arcane-dim:#4a3480;
    --blood:#c8203a;
    --bone:#ece3cf;
    --bone-dim:#9a8f77;
    --gold:#c9a227;
    --gold-dim:#6b5518;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:var(--obsidian);
    font-family:'Noto Serif JP', serif;
    touch-action:none;
    overscroll-behavior:none;
  }
  #wrap{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  canvas{display:block; background:var(--obsidian);}

  .eyebrow{
    font-family:'Cinzel', serif; letter-spacing:.35em; font-size:11px; color:var(--ember);
    text-transform:uppercase; text-shadow:0 0 8px rgba(255,106,43,.6);
  }

  /* ---- Top HUD ---- */
  #hud{
    position:fixed; top:0; left:0; right:0; padding:10px 12px 0 12px;
    display:flex; flex-direction:column; gap:6px; z-index:10; pointer-events:none;
  }
  .panel{
    background:linear-gradient(160deg,rgba(36,26,18,.86),rgba(14,10,8,.9));
    border:1px solid var(--gold-dim);
    border-radius:5px;
    box-shadow:inset 0 0 0 1px rgba(201,162,39,.2), 0 4px 12px rgba(0,0,0,.5);
    padding:6px 9px;
  }
  #rosterRow{display:flex; gap:6px; justify-content:center; flex-wrap:wrap;}
  .rosterItem{width:30px; display:flex; flex-direction:column; align-items:center; opacity:1; transition:opacity .35s;}
  .rosterItem.down{opacity:.32;}
  .rosterDot{
    width:16px; height:16px; border-radius:50%; box-shadow:0 0 6px rgba(0,0,0,.7), inset 0 0 3px rgba(255,255,255,.3);
    border:2px solid rgba(236,227,207,.35);
  }
  .rosterItem.down .rosterDot{filter:grayscale(1) brightness(.55);}
  .rosterBarTrack{width:26px; height:4px; background:#000; border:1px solid #000; border-radius:2px; margin-top:3px; overflow:hidden;}
  .rosterBarFill{height:100%; background:linear-gradient(180deg,#e8465e,var(--blood));}
  .rosterItem.hunterItem .rosterDot{ animation:hunterPulse 1s infinite; border-color:rgba(255,26,43,.8); }
  @keyframes hunterPulse{
    0%,100%{ box-shadow:0 0 5px 1px rgba(255,26,43,.8); }
    50%{ box-shadow:0 0 12px 5px rgba(255,26,43,.95); }
  }
  .rosterItem.elfItem .rosterDot{ animation:elfPulse 1.3s infinite; border-color:rgba(139,224,138,.85); }
  @keyframes elfPulse{
    0%,100%{ box-shadow:0 0 5px 1px rgba(139,224,138,.75); }
    50%{ box-shadow:0 0 12px 5px rgba(139,224,138,.9); }
  }

  #barsRow{display:flex; align-items:center; gap:10px;}
  .fname{font-family:'Cinzel',serif; font-weight:900; font-size:13px; color:var(--bone); letter-spacing:.06em; text-shadow:0 2px 4px #000;}
  .barTrack{height:11px; border:1px solid #000; background:#000; border-radius:2px; overflow:hidden; margin-top:3px; box-shadow:0 0 0 1px rgba(236,227,207,.15);}
  .barFill{height:100%; transition:width .18s ease-out;}
  .hpFill{background:linear-gradient(180deg,#e8465e,var(--blood)); box-shadow:0 0 6px rgba(200,32,58,.8);}
  .mpFill{background:linear-gradient(180deg,#b58cff,var(--arcane)); box-shadow:0 0 6px rgba(155,107,255,.7);}
  .stFill{background:linear-gradient(180deg,#f4c96b,#c4841f);}
  .miniBar{height:5px; margin-top:2px; border:1px solid #000; background:#000; border-radius:2px; overflow:hidden; width:100%;}
  #playerCol{flex:1; min-width:0;}
  #timer{
    text-align:center; font-family:'Cinzel',serif; font-weight:900; font-size:16px; color:var(--bone);
    text-shadow:0 0 10px rgba(0,0,0,.8); white-space:nowrap; min-width:44px;
  }
  #aliveCount{
    font-family:'Cinzel',serif; font-weight:700; font-size:12px; color:var(--gold); letter-spacing:.08em;
    text-shadow:0 0 8px rgba(0,0,0,.8); white-space:nowrap;
  }
  #goldCount{
    font-family:'Cinzel',serif; font-weight:700; font-size:12px; color:var(--gold); letter-spacing:.04em;
    text-shadow:0 0 8px rgba(0,0,0,.8); white-space:nowrap;
  }

  /* ---- Shop overlay ---- */
  #shopOverlay{
    position:fixed; top:96px; left:0; right:0; z-index:25;
    display:flex; justify-content:center; pointer-events:none;
  }
  #shopPanel{
    pointer-events:all; width:82%; max-width:300px; text-align:center;
    box-shadow:inset 0 0 0 1px rgba(201,162,39,.25), 0 8px 22px rgba(0,0,0,.6);
  }
  #shopGold{
    font-family:'Cinzel',serif; font-weight:700; font-size:13px; color:var(--gold);
    text-align:center; margin:2px 0 8px;
  }
  #shopList{ display:flex; flex-direction:column; gap:6px; max-height:44vh; overflow-y:auto; }
  .shopItemBtn{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    width:100%; font-family:'Noto Serif JP',serif; font-size:12.5px; color:var(--bone);
    background:linear-gradient(180deg,#2a2018,#171310); border:1px solid var(--gold-dim);
    border-radius:4px; padding:8px 10px;
  }
  .shopItemBtn:disabled{ opacity:.38; }
  .shopItemBtn .ic{ font-size:17px; }
  .shopItemBtn .nm{ flex:1; text-align:left; margin-left:6px; }
  .shopItemBtn .pr{ color:var(--gold); font-weight:700; white-space:nowrap; }
  #shopLeaveBtn{ margin-top:10px; padding:9px 24px; font-size:13px; }

  #centerMsg{
    position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
    font-family:'Cinzel',serif; font-weight:900; color:var(--bone); text-align:center;
    text-shadow:0 0 20px rgba(255,106,43,.9), 0 4px 10px #000; letter-spacing:.08em;
    z-index:20; pointer-events:none; opacity:0; transition:opacity .25s, transform .25s;
  }
  #centerMsg.show{opacity:1;}

  /* ---- Overlays ---- */
  #startOverlay,#endOverlay{
    position:fixed; inset:0; z-index:40; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    background:radial-gradient(ellipse at center, rgba(28,22,19,.96), rgba(6,5,4,.99));
    text-align:center; padding:24px; padding-top:max(24px, env(safe-area-inset-top)); padding-bottom:max(24px, env(safe-area-inset-bottom)); gap:14px;
    overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y;
  }
  #endOverlay{display:none;}
  .title{
    font-family:'Cinzel',serif; font-weight:900; font-size:44px; color:var(--bone);
    letter-spacing:.12em; text-shadow:0 0 24px var(--ember), 0 4px 12px #000; margin:0;
  }
  .subtitle{color:var(--bone-dim); font-size:14px; letter-spacing:.05em; max-width:340px; line-height:1.7;}
  .btn{
    font-family:'Cinzel',serif; font-weight:700; letter-spacing:.1em; font-size:15px;
    color:var(--bone); background:linear-gradient(180deg,#332621,#1a1310);
    border:1px solid var(--ember-dim); padding:14px 34px; border-radius:3px; margin-top:8px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 0 18px rgba(255,106,43,.25);
    pointer-events:all;
  }
  .btn:active{ transform:scale(.96); background:linear-gradient(180deg,#3f2f27,#221813);}
  .charPreview{display:flex; flex-wrap:wrap; gap:14px; margin:6px 0; max-width:320px; justify-content:center;}
  .charTag{font-size:10px; color:var(--arcane); letter-spacing:.1em; margin-top:2px;}
  .charTag.mine{color:var(--ember);}
  #endTitle{font-family:'Cinzel',serif; font-weight:900; font-size:34px; letter-spacing:.08em;}
  #endTitle.win{color:var(--ember); text-shadow:0 0 30px var(--ember);}
  #endTitle.lose{color:#8a8a8a; text-shadow:0 0 20px rgba(0,0,0,.8);}

  /* ---- Touch controls ---- */
  #controls{position:fixed; inset:0; z-index:15; pointer-events:none;}
  #joyZone{
    position:fixed; left:0; bottom:0; width:46vw; height:46vw; max-width:220px; max-height:220px;
    margin:16px; pointer-events:all;
  }
  #joyBase{
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(60,45,35,.55), rgba(10,8,6,.55));
    border:2px solid rgba(236,227,207,.18); box-shadow:inset 0 0 20px rgba(0,0,0,.6);
  }
  #joyNub{
    position:absolute; width:38%; height:38%; left:31%; top:31%; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffb27a, var(--ember-dim));
    border:1px solid rgba(0,0,0,.4); box-shadow:0 0 16px rgba(255,106,43,.6);
    transition:transform .05s linear;
  }
  #actionZone{
    position:fixed; right:0; bottom:0; margin:14px; pointer-events:all;
    display:grid; grid-template-columns:78px 78px; grid-template-rows:78px 78px;
    gap:12px; align-items:end;
  }
  .abtn{
    border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column;
    border:2px solid rgba(236,227,207,.25); font-family:'Cinzel',serif; color:var(--bone);
    box-shadow:0 4px 10px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .abtn .lbl{font-size:10px; letter-spacing:.06em; margin-top:2px;}
  .abtn .ic{font-size:25px;}
  #btnAttack{background:radial-gradient(circle at 35% 30%,#e0553a,#7a2312); grid-column:2; grid-row:2;}
  #btnSpell{background:radial-gradient(circle at 35% 30%,#a97bff,#4a2b8f); grid-column:1; grid-row:1;}
  #btnDash{background:radial-gradient(circle at 35% 30%,#f4d27a,#8a6a1a); grid-column:1; grid-row:2;}
  #btnBlock{background:radial-gradient(circle at 35% 30%,#8fa0ac,#33424b); grid-column:2; grid-row:1;}
  .abtn:active, .abtn.pressed{ filter:brightness(1.35); transform:scale(.94);}
  .abtn.cooldown{filter:grayscale(.7) brightness(.5);}

  #hintBar{
    position:fixed; bottom:8px; left:0; right:0; text-align:center; color:var(--bone-dim);
    font-size:10px; letter-spacing:.06em; z-index:16; pointer-events:none; opacity:.7;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud">
  <div class="panel" id="rosterPanel"><div id="rosterRow"></div></div>
  <div class="panel" id="barsRow">
    <div id="playerCol">
      <div class="fname" id="p1name">灰の剣士</div>
      <div class="barTrack"><div class="barFill hpFill" id="p1hp" style="width:100%"></div></div>
      <div class="miniBar"><div class="barFill mpFill" id="p1mp" style="width:100%"></div></div>
      <div class="miniBar"><div class="barFill stFill" id="p1st" style="width:100%"></div></div>
    </div>
    <div id="timer">60</div>
    <div id="aliveCount">残り 6</div>
    <div id="goldCount">💰0</div>
  </div>
  <div class="panel" id="bossPanel" style="display:none;">
    <div class="fname" id="bossName" style="color:var(--arcane); text-align:center;">氷帝</div>
    <div class="barTrack"><div class="barFill hpFill" id="bossHp" style="width:100%; background:linear-gradient(180deg,#cfeeff,#4fa8e0); box-shadow:0 0 6px rgba(127,217,255,.8);"></div></div>
  </div>
</div>

<div id="centerMsg"></div>

<div id="shopOverlay" style="display:none;">
  <div class="panel" id="shopPanel">
    <div class="eyebrow" style="color:var(--gold); text-align:center;">商店</div>
    <div id="shopGold"></div>
    <div id="shopList"></div>
    <button class="btn" id="shopLeaveBtn">立ち去る</button>
  </div>
</div>

<div id="controls">
  <div id="joyZone"><div id="joyBase"></div><div id="joyNub"></div></div>
  <div id="actionZone">
    <div class="abtn" id="btnSpell"><div class="ic">🔥</div><div class="lbl">魔法</div></div>
    <div class="abtn" id="btnBlock"><div class="ic">🛡</div><div class="lbl">防御</div></div>
    <div class="abtn" id="btnDash"><div class="ic">💨</div><div class="lbl">跳躍</div></div>
    <div class="abtn" id="btnAttack"><div class="ic">⚔</div><div class="lbl">斬撃</div></div>
  </div>
</div>
<div id="hintBar">左：移動　／　右下：斬撃・防御・跳躍・魔法　／　アイテムは踏むと拾う　／　家に隠れられる（被弾2回で崩壊、殺人鬼は迷わず叩き壊す）　／　家のうち2軒は店（金貨で購入可、破壊されたら即終了）　（PC: WASD移動 / J攻撃 K魔法 L跳躍 Shift防御）</div>

<div id="startOverlay">
  <div class="eyebrow">BATTLE ROYALE ARENA</div>
  <h1 class="title">THE PIT</h1>
  <div class="charPreview" id="charPreview"></div>
  <button class="btn" id="startBtn">闘技場へ入る</button>
  <div class="subtitle">六人の闘士が闘技場で殺し合う。生き残れば勝利。アイテムを拾い、家に隠れ、店で買い物もできる。村人を殺すと全員に狙われるので注意。</div>
</div>

<div id="endOverlay">
  <div id="endTitle">VICTORY</div>
  <div class="subtitle" id="endSub"></div>
  <button class="btn" id="retryBtn">もう一度戦う</button>
</div>

<script>
(function(){
"use strict";

/* ============ Canvas Setup ============ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W,H,DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* ============ World / Arena ============ */
const WORLD_RMAX = 820;
const WORLD_RMIN = 210;
const SAFE_TIME = 34;   // seconds before the ring starts closing
const SHRINK_TIME = 46; // seconds for the ring to fully close after that
const arena = { cx:0, cy:0, r:WORLD_RMAX };
let matchTimer = 0;

/* ============ Obstacles (buildings / trees / villagers) ============ */
const OBSTACLE_BUILDING_COUNT = 4;
const OBSTACLE_TREE_COUNT = 14;
const OBSTACLE_VILLAGER_COUNT = 6;
const BUILDING_RADIUS = 50;
const BUILDING_HITS = 2;        // 家は被弾2回で崩壊する（ダメージ量ではなく命中回数で判定）
const DOOR_RADIUS = 22;         // 正面から接触したと判定する際の距離バッファ（家の当たり判定+この値まで許容）
const HOUSE_EXIT_MOVE_THRESHOLD = 0.35; // 隠れている間にこの強さ以上の移動入力をすると外に出る
const HOUSE_ENTER_GRACE = 0.35; // 入室直後、この秒数の間は移動入力による退出判定を無視する（入室に使った入力の誤爆防止）
const HOUSE_SEEK_RADIUS = 560;  // NPCが隠れ場所として家を探す範囲
const HOUSE_MIN_HIDE = 2.2;     // NPCが隠れ続ける最短秒数
const HOUSE_HIDE_JITTER = 2.6;  // 上記に加算されるランダム秒数
const TREE_RADIUS = 20;
const TREE_HP = 40;
const VILLAGER_RADIUS = 15;
const VILLAGER_HP = 22;
const VILLAGER_SPEED = 66;
let obstacles = []; // {type:'building'|'tree'|'villager', x,y,r,hp,maxHp,alive,indestructible,...}

const SHOP_BUILDING_COUNT = 2; // 4軒の家のうち店になる軒数
function generateObstacles(){
  obstacles = [];
  placeObstacles('building', OBSTACLE_BUILDING_COUNT, BUILDING_RADIUS);
  const buildings = obstacles.filter(o=>o.type==='building');
  const shopPicks = shuffleArray(buildings).slice(0, Math.min(SHOP_BUILDING_COUNT, buildings.length));
  for(const b of shopPicks) b.isShop = true;
  placeObstacles('tree', OBSTACLE_TREE_COUNT, TREE_RADIUS);
  placeObstacles('villager', OBSTACLE_VILLAGER_COUNT, VILLAGER_RADIUS);
}

function placeObstacles(type, count, r){
  let attempts=0, placed=0;
  while(placed<count && attempts<count*60){
    attempts++;
    const ang = Math.random()*Math.PI*2;
    const rad = Math.sqrt(Math.random())*(WORLD_RMAX*0.82);
    const x = Math.cos(ang)*rad, y = Math.sin(ang)*rad;
    let ok = true;
    for(const o of obstacles){
      if(dist(x,y,o.x,o.y) < r+o.r+16){ ok=false; break; }
    }
    if(ok){
      for(const f of fighters){
        if(dist(x,y,f.x,f.y) < r+70){ ok=false; break; }
      }
    }
    if(!ok) continue;
    const obj = {
      type, x, y, r, alive:true,
      hp: type==='building'? BUILDING_HITS : (type==='tree'? TREE_HP : VILLAGER_HP),
      maxHp: type==='tree'? TREE_HP : (type==='villager'? VILLAGER_HP : BUILDING_HITS),
      indestructible: false,
      rot: Math.random()*Math.PI*2,
      seed: Math.random()*10,
    };
    if(type==='villager'){
      obj.vx=0; obj.vy=0; obj.wanderT=Math.random()*2; obj.wanderDX=0; obj.wanderDY=0;
      obj.carriedItem=null;
    }
    if(type==='building'){
      obj.villagerCooldown = 0;
      obj.occupants = []; // 現在この家に隠れている戦闘士たち
      obj.isShop = false;
    }
    obstacles.push(obj);
    placed++;
  }
}

const BUILDING_VILLAGER_COOLDOWN = 18; // 建物から村人が出た後、再び出るまでの秒数
function spawnVillagerFromBuilding(building){
  const ang = Math.random()*Math.PI*2;
  const spawnDist = building.r + VILLAGER_RADIUS + 8;
  const vx = building.x + Math.cos(ang)*spawnDist;
  const vy = building.y + Math.sin(ang)*spawnDist;
  const obj = {
    type:'villager', x:vx, y:vy, r:VILLAGER_RADIUS, alive:true,
    hp:VILLAGER_HP, maxHp:VILLAGER_HP,
    indestructible:false,
    rot:Math.random()*Math.PI*2, seed:Math.random()*10,
    vx:0, vy:0, wanderT:0.4+Math.random()*1.5, wanderDX:0, wanderDY:0,
    carriedItem:null,
  };
  obstacles.push(obj);
  spawnParticles(vx, vy-6, '#e8c9a0', 12, 110, 0.5, 3, 20);
}

function checkForestDestroyed(){
  if(elfSpawned || championStage) return;
  const anyTreeLeft = obstacles.some(o=>o.type==='tree' && o.alive);
  if(!anyTreeLeft) spawnElfArcher();
}

function damageObstacle(o, dmg, attacker){
  if(!o.alive || o.indestructible) return;
  if(o.type==='tree'){
    o.hp = 0; // 木はどんな攻撃でも必ず1撃で倒れる
  } else if(o.type==='building'){
    o.hp -= 1; // 家はダメージ量ではなく「命中回数」で判定：2回被弾で崩壊
  } else {
    o.hp -= dmg;
  }
  spawnParticles(o.x, o.y-14, o.type==='tree'? '#8a6a3a' : (o.type==='building'? '#a8896a' : '#c8203a'), 10, 120, 0.35, 3, o.type==='tree'?0:40);
  if(o.hp<=0 && o.alive){
    o.alive = false;
    if(o.type==='tree'){
      spawnParticles(o.x,o.y-10,'#5a7a3a',22,150,0.5,4,60);
      addShake(4);
      checkForestDestroyed();
    } else if(o.type==='villager'){
      villagerKilled(o, attacker);
    } else if(o.type==='building'){
      spawnParticles(o.x,o.y-10,'#c9a880',30,190,0.6,5,70);
      addShake(attacker && attacker.isPlayer? 10 : 6);
      ejectFromDestroyedHouse(o, true);
    }
  } else if(o.hp>0 && o.type==='building'){
    addShake(3);
  }
}

/* ============ House hiding (家の中に隠れる) ============ */
// 家は見た目上回転しないので、常に画面下側（+y）の壁がフロント（正面）になる。
function buildingGeom(o){
  return { w:o.r*1.8, h:o.r*1.4 };
}
function buildingDoorPos(o){
  // 家の正面（画面下側）、当たり判定の少し外側にある「入口の外」の地点。
  // NPCがここを目指して歩けば、自然に正面から接触することになる。
  return { x:o.x, y:o.y + o.r + 50 };
}
function findNearestAliveBuilding(x, y, radius){
  let best=null, bestD=radius;
  for(const o of obstacles){
    if(o.type!=='building' || !o.alive) continue;
    const d = dist(x,y,o.x,o.y);
    if(d<bestD){ bestD=d; best=o; }
  }
  return best;
}
function enterHouse(f, building){
  if(!f.alive || f.hidingIn || !building.alive) return;
  f.hidingIn = building;
  f._seekHouse = null;
  f._hideTimer = HOUSE_MIN_HIDE + Math.random()*HOUSE_HIDE_JITTER;
  f._hideEnterGrace = HOUSE_ENTER_GRACE; // 入室直後の一定時間は退出判定（移動入力）を無視する
  f.state = 'idle'; f.stateTime = 0;
  f.vx=0; f.vy=0; f.knockVx=0; f.knockVy=0;
  f.blocking = false;
  if(!building.occupants) building.occupants=[];
  building.occupants.push(f);
  const doorPt = buildingDoorPos(building);
  f.x = doorPt.x; f.y = doorPt.y;
  spawnParticles(doorPt.x, doorPt.y, '#e8c9a0', 8, 90, 0.4, 2, 0);
  if(building.isShop && f.isPlayer){
    openShopUI(building);
  } else if(f.isPlayer){
    showCenterMsg('家の中に隠れた…', 1000);
  }
}
function exitHouse(f, opts){
  const building = f.hidingIn;
  if(!building) return;
  const wasShop = building.isShop;
  f.hidingIn = null;
  f._hideTimer = 0;
  f._hideEnterGrace = 0;
  if(building.occupants) building.occupants = building.occupants.filter(x=>x!==f);
  const doorPt = buildingDoorPos(building);
  f.x = doorPt.x; f.y = doorPt.y + 16;
  f.state='idle'; f.stateTime=0;
  if(wasShop && f.isPlayer) closeShopUI();
  if(f.isPlayer && !wasShop && !(opts && opts.silent)) showCenterMsg('家の外に出た', 800);
}
function ejectFromDestroyedHouse(building, broken){
  if(!building.occupants || building.occupants.length===0) return;
  const wasShop = !!building.isShop;
  for(const f of building.occupants.slice()){
    exitHouse(f, {silent:true});
    if(f.alive && broken){
      f.state='hit'; f.stateTime=0; f.hitstun=Math.max(f.hitstun,0.3);
      spawnParticles(f.x,f.y-10,'#ff8a3d',18,150,0.5,4,30);
      if(f.isPlayer){
        showCenterMsg(wasShop? '店が崩れ落ちた！買い物は強制終了だ！' : '隠れ家が崩れ、外に投げ出された！', 1200);
      }
    }
  }
  building.occupants = [];
}

function villagerKilled(o, attacker){
  spawnParticles(o.x,o.y-10,'#c8203a',26,170,0.55,4,60);
  addShake(attacker && attacker.isPlayer? 10:5);
  graves.push({x:o.x,y:o.y,name:'村人'});
  if(o.carriedItem){
    dropItemAt(o.carriedItem, o.x, o.y);
    if(attacker && attacker.isPlayer){
      showCenterMsg('村人の持ち物を奪える！', 1100);
    }
    o.carriedItem = null;
  }
  if(attacker && attacker.alive){
    attacker.isKiller = true;
    if(attacker.isPlayer){
      showCenterMsg('村人殺し！', 1100);
    }
  }
}

function updateObstacles(dt){
  for(const o of obstacles){
    if(!o.alive) continue;
    const dc = dist(o.x,o.y,arena.cx,arena.cy);
    if(dc > arena.r+6){
      o.alive = false;
      spawnParticles(o.x,o.y,'#ff8a3d',24,200,0.8,4,30);
      if(o.type==='tree') checkForestDestroyed();
      if(o.type==='building') ejectFromDestroyedHouse(o, false);
      continue;
    }
    if(o.type==='villager') updateVillager(o, dt);
    if(o.type==='building' && o.villagerCooldown>0) o.villagerCooldown -= dt;
  }
}

function updateVillager(o, dt){
  o.wanderT -= dt;
  let nearestF=null, nearestD=Infinity;
  for(const f of fighters){
    if(!f.alive) continue;
    const d = dist(o.x,o.y,f.x,f.y);
    if(d<nearestD){ nearestD=d; nearestF=f; }
  }
  if(nearestF && nearestD < 150){
    const dx=o.x-nearestF.x, dy=o.y-nearestF.y;
    const d=Math.hypot(dx,dy)||1;
    o.vx = dx/d*VILLAGER_SPEED;
    o.vy = dy/d*VILLAGER_SPEED;
  } else {
    const itemGoal = o.carriedItem? null : findDesirableItem(o, VILLAGER_ITEM_SEEK_RADIUS);
    if(itemGoal){
      const dx=itemGoal.x-o.x, dy=itemGoal.y-o.y;
      const d=Math.hypot(dx,dy)||1;
      o.vx = dx/d*VILLAGER_SPEED*0.85;
      o.vy = dy/d*VILLAGER_SPEED*0.85;
    } else if(o.wanderT<=0){
      o.wanderT = 1+Math.random()*2.5;
      const ang = Math.random()*Math.PI*2;
      o.wanderDX = Math.cos(ang); o.wanderDY = Math.sin(ang);
      o.vx = o.wanderDX*VILLAGER_SPEED*0.4;
      o.vy = o.wanderDY*VILLAGER_SPEED*0.4;
    } else {
      o.vx = o.wanderDX*VILLAGER_SPEED*0.4;
      o.vy = o.wanderDY*VILLAGER_SPEED*0.4;
    }
  }
  o.x += o.vx*dt; o.y += o.vy*dt;
  for(const other of obstacles){
    if(other===o || !other.alive) continue;
    const od = dist(o.x,o.y,other.x,other.y);
    const minD = o.r+other.r;
    if(od<minD && od>0.01){
      const push=(minD-od);
      const nx=(o.x-other.x)/od, ny=(o.y-other.y)/od;
      o.x += nx*push; o.y += ny*push;
    }
  }
}

function resolveObstacleCollisions(){
  for(const f of fighters){
    if(!f.alive || f.hidingIn) continue; // 隠れている間は何とも衝突しない
    for(const o of obstacles){
      if(!o.alive) continue;
      const minD = 26 + o.r;
      const od = dist(f.x,f.y,o.x,o.y);
      if(o.type==='building' && (f.state==='idle'||f.state==='walk')){
        // 家の正面（下側=+y方向）からほぼ真っ直ぐ接触した場合は、押し出す代わりに中に入れる
        const dxf = f.x-o.x, dyf = f.y-o.y;
        const frontFacing = dyf > Math.abs(dxf)*0.55;
        if(frontFacing && od < minD + DOOR_RADIUS){
          enterHouse(f, o);
          continue; // このobstacleについてはこれ以上の判定は不要
        }
      }
      if(od < minD && od>0.01){
        const push = minD-od;
        const nx=(f.x-o.x)/od, ny=(f.y-o.y)/od;
        f.x += nx*push; f.y += ny*push;
        if(f.isPlayer && o.type==='building' && (o.villagerCooldown||0)<=0){
          o.villagerCooldown = BUILDING_VILLAGER_COOLDOWN;
          spawnVillagerFromBuilding(o);
          showCenterMsg('家から村人が飛び出してきた！', 1100);
        }
      }
    }
  }
}

/* ============ Drop Items ============ */
// 地面に落ちているアイテム。プレイヤー／NPC戦闘士は踏むと即座に効果を受ける。
// 村人は効果を使わず「持ち帰る」だけ＝殺せばその場にアイテムが再ドロップし、奪い取れる。
const ITEM_RADIUS = 15;
const ITEM_DEFS = {
  herb:      { icon:'🌿', color:'#7ec25a', name:'薬草' },
  mana:      { icon:'💧', color:'#6bc9ff', name:'魔力の雫' },
  helmet:    { icon:'⛑️', color:'#b8b8c2', name:'鉄兜' },
  venom:     { icon:'🧪', color:'#8ee06b', name:'毒の短剣' },
  bow:       { icon:'🏹', color:'#caa46b', name:'弓矢' },
  wand:      { icon:'🪄', color:'#c9a8ff', name:'魔法の杖' },
  shield:    { icon:'🛡️', color:'#8fa0ac', name:'盾' },
  clone:     { icon:'👥', color:'#ffd27a', name:'分身の秘薬' },
  excalibur: { icon:'⚔️', color:'#ffe9a8', name:'エクスカリバー' },
  horse:     { icon:'🐴', color:'#c98a4e', name:'馬' },
  poop:      { icon:'💩', color:'#6b4a2f', name:'うんこ' },
  gold:      { icon:'💰', color:'#ffd700', name:'金貨' },
};
// アイテムの価値ランク（common/uncommon/rare は複数出現しうる消費・恒久バフ、
// legendary=馬・エクスカリバーは世界に常に1つだけしか存在しない）
const ITEM_TIER = {
  herb:'common', poop:'common', mana:'common', gold:'common',
  helmet:'uncommon', shield:'uncommon',
  venom:'rare', bow:'rare', wand:'rare', clone:'rare',
  horse:'legendary', excalibur:'legendary',
};
const ITEM_MAX_COUNT = 9;
const ITEM_SPAWN_INTERVAL = 9; // 追加スポーンの目安間隔(秒)
const ITEM_SEEK_RADIUS = 340;         // NPC戦闘士がアイテムに気づいて向かう距離
const VILLAGER_ITEM_SEEK_RADIUS = 230; // 村人がアイテムに気づいて向かう距離
const HERB_HEAL_RATIO = 0.32;
const MANA_RESTORE_RATIO = 0.45;
const STOCK_MAX = 3;                  // 薬草／魔力の雫は満タン時にストックされる（最大所持数）
const AUTO_HEAL_HP_RATIO = 0.30;      // HPがこの割合を下回るとストックした薬草を自動使用
const AUTO_MANA_RATIO = 0.15;         // MPがこの割合を下回るとストックした魔力の雫を自動使用
const AUTO_USE_COOLDOWN = 1.0;        // 自動使用の連発防止クールダウン(秒)
const POOP_SLOW_TIME = 8;
const POOP_SLOW_MULT = 0.5;
const HORSE_SPEED_MULT = 1.42;
const EXCALIBUR_DMG_BONUS = 9;
const EXCALIBUR_RANGE_BONUS = 16;
const EXCALIBUR_KNOCK_BONUS = 110;
const HELMET_DEFENSE_MULT = 0.80;  // 被ダメージ20%軽減
const VENOM_POISON_DPS = 5;
const VENOM_POISON_TIME = 4;
const BOW_ARROW_COUNT = 5;            // 弓矢は5発だけ。撃ち尽くすと元の武器に戻る
const WAND_SPELL_DMG_BONUS = 10;
const WAND_MANA_DISCOUNT = 8;         // 杖入手で魔法の消費MPが下がる
const SHIELD_BLOCK_POWER = 0.55;      // 低いほど防御が強い（被ダメ／被ノックバック／スタミナ消費すべて減）
const GOLD_GROUND_MIN = 6, GOLD_GROUND_MAX = 16;   // 地面に自然発生する金貨の枚数
const GOLD_KILL_MIN = 14, GOLD_KILL_MAX = 34;      // 戦闘士を倒して奪える金貨の枚数
let items = []; // {type,x,y,r,alive,seed,amount(goldのみ)}
let itemSpawnTimer = 0;

// 馬とエクスカリバーは「世界に1つだけ」。地面に落ちている個体、または誰かが
// 所持中（騎乗中／装備中）の個体のいずれかが必ず存在する状態を維持し、
// 追加で新規スポーンさせない＝手に入れたければ持ち主を殺して奪うしかなくする。
function singletonExists(type){
  if(items.some(it=>it.alive && it.type===type)) return true;
  if(type==='horse') return fighters.some(f=>f.alive && f.mounted);
  if(type==='excalibur') return fighters.some(f=>f.alive && f.hasExcalibur);
  return false;
}

function pickItemType(){
  const table = [
    ['herb', 22], ['poop', 15], ['mana', 13], ['gold', 16], ['helmet', 10], ['shield', 9],
    ['venom', 8], ['bow', 7], ['wand', 6], ['clone', 3],
  ];
  if(!singletonExists('horse')) table.push(['horse', 6]);
  if(!singletonExists('excalibur')) table.push(['excalibur', 3]);
  const total = table.reduce((s,[,w])=>s+w, 0);
  let roll = Math.random()*total;
  for(const [type,w] of table){
    if(roll<w) return type;
    roll -= w;
  }
  return 'herb';
}

function itemTooClose(x,y){
  for(const o of obstacles){ if(o.alive && dist(x,y,o.x,o.y) < o.r+34) return true; }
  for(const it of items){ if(it.alive && dist(x,y,it.x,it.y) < 60) return true; }
  return false;
}

function spawnRandomItem(x, y, forcedType, opts){
  let px=x, py=y;
  if(px===undefined || py===undefined){
    let attempts=0, ok=false;
    do{
      const ang = Math.random()*Math.PI*2;
      const rad = Math.sqrt(Math.random())*(arena.r*0.82);
      px = arena.cx + Math.cos(ang)*rad;
      py = arena.cy + Math.sin(ang)*rad;
      attempts++;
      ok = !itemTooClose(px,py);
    } while(!ok && attempts<24);
  }
  const type = forcedType||pickItemType();
  const it = { type, x:px, y:py, r:ITEM_RADIUS, alive:true, seed:Math.random()*10 };
  if(type==='gold'){
    it.amount = (opts && opts.amount!==undefined)? opts.amount
      : (GOLD_GROUND_MIN + Math.floor(Math.random()*(GOLD_GROUND_MAX-GOLD_GROUND_MIN+1)));
  }
  items.push(it);
}

function dropItemAt(type, x, y, opts){
  spawnRandomItem(x, y, type, opts);
}

function generateItems(){
  items = [];
  itemSpawnTimer = ITEM_SPAWN_INTERVAL*0.6;
  // 伝説級アイテムは開幕時に必ず1つずつ世界に出す（以後は補充されない＝奪い合いになる）
  spawnRandomItem(undefined, undefined, 'horse');
  spawnRandomItem(undefined, undefined, 'excalibur');
  for(let i=0;i<4;i++) spawnRandomItem();
}

function getEffectiveMoveMult(f){
  let m = f.moveSpeedMult||1;
  if(f.mounted) m *= HORSE_SPEED_MULT;
  if(f.slowTimer>0) m *= POOP_SLOW_MULT;
  return m;
}

// NPC戦闘士・村人が「積極的に奪いに行く」対象アイテムを探す。
// うんこは誰も自分からは拾いに行かない。既に持っている効果（馬/エクスカリバー/満タンHP）は無視する。
function findDesirableItem(entity, maxDist){
  maxDist = maxDist || ITEM_SEEK_RADIUS;
  const isFighterEntity = entity.weapon !== undefined;
  let best=null, bestD=Infinity;
  for(const it of items){
    if(!it.alive || it.type==='poop') continue;
    if(isFighterEntity){
      if(it.type==='herb' && entity.hp >= entity.maxHp*0.95 && (entity.herbStock||0)>=STOCK_MAX) continue;
      if(it.type==='mana' && entity.mp >= entity.maxMp*0.95 && (entity.manaStock||0)>=STOCK_MAX) continue;
      if(it.type==='helmet' && entity.hasHelmet) continue;
      if(it.type==='venom' && entity.hasVenom) continue;
      if(it.type==='shield' && entity.hasShield) continue;
      if(it.type==='wand' && entity.hasWand) continue;
      if(it.type==='bow' && entity.hasBow && (entity.arrowsLeft||0)>=BOW_ARROW_COUNT) continue;
      if(it.type==='clone' && entity.allyRef && entity.allyRef.alive) continue;
      if(it.type==='horse' && entity.mounted) continue;
      if(it.type==='excalibur' && entity.hasExcalibur) continue;
    } else if(entity.carriedItem){
      continue;
    }
    const d = dist(entity.x,entity.y,it.x,it.y);
    if(d>maxDist) continue;
    if(d<bestD){ bestD=d; best=it; }
  }
  return best;
}

function applyItemEffect(f, type, item){
  const def = ITEM_DEFS[type];
  spawnParticles(f.x,f.y-20, def.color, 16,130,0.5,3,20);
  addShake(f.isPlayer?4:2);
  if(type==='gold'){
    const amt = (item && item.amount!==undefined)? item.amount : GOLD_GROUND_MIN;
    f.gold = (f.gold||0) + amt;
    if(f.isPlayer){
      showCenterMsg('金貨を'+amt+'枚手に入れた！(所持'+f.gold+')', 1000);
      if(shopOpenFor) renderShopUI();
    }
  } else if(type==='herb'){
    if(f.hp >= f.maxHp*0.95){
      f.herbStock = Math.min(STOCK_MAX, (f.herbStock||0)+1);
      if(f.isPlayer) showCenterMsg('薬草をストックした(x'+f.herbStock+')', 900);
    } else {
      f.hp = clamp(f.hp + f.maxHp*HERB_HEAL_RATIO, 0, f.maxHp);
      if(f.isPlayer) showCenterMsg('薬草でHP回復！', 900);
    }
  } else if(type==='poop'){
    f.slowTimer = POOP_SLOW_TIME;
    if(f.isPlayer) showCenterMsg('うんこを踏んだ…足が滑る', 1000);
  } else if(type==='mana'){
    if(f.mp >= f.maxMp*0.95){
      f.manaStock = Math.min(STOCK_MAX, (f.manaStock||0)+1);
      if(f.isPlayer) showCenterMsg('魔力の雫をストックした(x'+f.manaStock+')', 900);
    } else {
      f.mp = clamp(f.mp + f.maxMp*MANA_RESTORE_RATIO, 0, f.maxMp);
      if(f.isPlayer) showCenterMsg('魔力の雫でMP回復！', 900);
    }
  } else if(type==='helmet'){
    if(!f.hasHelmet){
      f.hasHelmet = true;
      f.defenseMult = (f.defenseMult||1) * HELMET_DEFENSE_MULT;
    }
    if(f.isPlayer) showCenterMsg('鉄兜を装備！被ダメージ軽減', 1000);
  } else if(type==='shield'){
    if(!f.hasShield){
      f.hasShield = true;
      f.blockPower = SHIELD_BLOCK_POWER;
    }
    if(f.isPlayer) showCenterMsg('盾を入手！ガード性能が上昇', 1000);
  } else if(type==='venom'){
    f.hasVenom = true;
    if(f.isPlayer) showCenterMsg('毒の短剣を入手！攻撃に猛毒', 1000);
  } else if(type==='wand'){
    if(!f.hasWand){
      f.hasWand = true;
      f.spellDmg += WAND_SPELL_DMG_BONUS;
      f.spellMana = Math.max(8, f.spellMana - WAND_MANA_DISCOUNT);
    }
    if(f.isPlayer) showCenterMsg('魔法の杖を入手！魔法が強化された', 1000);
  } else if(type==='bow'){
    if(!f.hasBow){
      f.hasBow = true;
      f.prevWeapon = f.weapon;
      f.weapon = 'bow';
      f.arrowsLeft = BOW_ARROW_COUNT;
    } else {
      f.arrowsLeft = Math.min(BOW_ARROW_COUNT, (f.arrowsLeft||0) + BOW_ARROW_COUNT);
    }
    if(f.isPlayer) showCenterMsg('弓矢を入手！矢 x'+f.arrowsLeft, 1000);
  } else if(type==='clone'){
    spawnClone(f);
  } else if(type==='horse'){
    f.mounted = true;
    if(f.isPlayer) showCenterMsg('馬に乗った！移動速度上昇', 1000);
  } else if(type==='excalibur'){
    if(!f.hasExcalibur){
      f.hasExcalibur = true;
      f.prevWeapon = f.weapon;
      f.weapon = 'excalibur';
      f.atkDmg += EXCALIBUR_DMG_BONUS;
      f.atkRange += EXCALIBUR_RANGE_BONUS;
      f.atkKnock += EXCALIBUR_KNOCK_BONUS;
    }
    if(f.isPlayer) showCenterMsg('エクスカリバー入手！攻撃力上昇', 1000);
  }
}

function updateItems(dt){
  itemSpawnTimer -= dt;
  if(itemSpawnTimer<=0 && items.filter(i=>i.alive).length < ITEM_MAX_COUNT){
    itemSpawnTimer = ITEM_SPAWN_INTERVAL*(0.7+Math.random()*0.7);
    spawnRandomItem();
  }
  for(const it of items){
    if(!it.alive) continue;
    if(dist(it.x,it.y,arena.cx,arena.cy) > arena.r+6) it.alive=false;
  }
  // 戦闘士（プレイヤー／NPC／殺人鬼）は踏むと即効果
  for(const f of fighters){
    if(!f.alive) continue;
    for(const it of items){
      if(!it.alive) continue;
      if(dist(f.x,f.y,it.x,it.y) < it.r+24){
        it.alive=false;
        applyItemEffect(f, it.type, it);
      }
    }
  }
  // 村人は効果を使わず、拾って「持ち帰る」だけ（殺せば奪える）
  for(const o of obstacles){
    if(o.type!=='villager' || !o.alive || o.carriedItem) continue;
    for(const it of items){
      if(!it.alive) continue;
      if(dist(o.x,o.y,it.x,it.y) < it.r+o.r){
        it.alive=false;
        o.carriedItem = it.type;
        spawnParticles(o.x,o.y-20, ITEM_DEFS[it.type].color, 10,90,0.4,3,20);
        break;
      }
    }
  }
  for(let i=items.length-1;i>=0;i--){ if(!items[i].alive) items.splice(i,1); }
}

/* ============ Shop (金貨で購入できる店) ============ */
// 4軒の家のうち2軒は店になっており、正面から入ると買い物UIが開く。
// 買い物中もリアルタイムでバトルは進行し、店（家）が壊されれば強制的に追い出される。
const SHOP_ITEMS = ['herb','mana','helmet','shield','venom','bow','wand','clone'];
const SHOP_PRICES = { herb:16, mana:16, helmet:42, shield:42, venom:38, bow:55, wand:60, clone:85 };
let shopOpenFor = null; // 現在買い物UIを開いている店(building)への参照

function affordableItemExists(gold){
  for(const type of SHOP_ITEMS){ if(SHOP_PRICES[type] <= (gold||0)) return true; }
  return false;
}
function openShopUI(building){
  const p = fighters[0];
  if(!p || !affordableItemExists(p.gold)){
    shopOpenFor = null;
    if(p && p.isPlayer) showCenterMsg('金貨が足りず、何も買えない…', 1200);
    return;
  }
  shopOpenFor = building;
  renderShopUI();
  const el = document.getElementById('shopOverlay');
  if(el) el.style.display = 'flex';
}
function closeShopUI(){
  shopOpenFor = null;
  const el = document.getElementById('shopOverlay');
  if(el) el.style.display = 'none';
}
function renderShopUI(){
  const p = fighters[0];
  if(!p) return;
  const goldEl = document.getElementById('shopGold');
  if(goldEl) goldEl.textContent = '所持金貨 💰'+(p.gold||0);
  const list = document.getElementById('shopList');
  if(!list) return;
  list.innerHTML = '';
  for(const type of SHOP_ITEMS){
    const def = ITEM_DEFS[type];
    const price = SHOP_PRICES[type];
    const afford = (p.gold||0) >= price;
    const btn = document.createElement('button');
    btn.className = 'shopItemBtn';
    btn.disabled = !afford;
    btn.innerHTML = '<span class="ic">'+def.icon+'</span><span class="nm">'+def.name+'</span><span class="pr">'+price+'G</span>';

function buyShopItem(type){
  const p = fighters[0];
  if(!p || !p.alive || !p.hidingIn || !p.hidingIn.isShop) return;
  if(!p.hidingIn.alive){ closeShopUI(); return; }
  const price = SHOP_PRICES[type];
  if((p.gold||0) < price) return;
  p.gold -= price;
  applyItemEffect(p, type);
  updateHUD();
  if(!affordableItemExists(p.gold)){
    showCenterMsg('金貨が足りず、もう何も買えない…', 1200);
    closeShopUI();
    return;
  }
  renderShopUI();
}

/* ============ Utility ============ */
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function lerp(a,b,t){return a+(b-a)*t;}
function now(){return performance.now();}

/* ============ Particles ============ */
let particles = [];
function spawnParticles(x,y,color,count,speed,life,size,gravity){
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = speed*(0.4+Math.random()*0.9);
    particles.push({
      x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      life: life*(0.6+Math.random()*0.6), maxLife: life,
      color, size: size*(0.5+Math.random()), gravity: gravity||0
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life -= dt;
    if(p.life<=0){particles.splice(i,1); continue;}
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.vy += (p.gravity||0)*dt;
    p.vx *= 0.98; p.vy *= 0.98;
  }
}
function drawParticles(){
  for(const p of particles){
    const a = clamp(p.life/p.maxLife,0,1);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*a+0.5,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

  } else if(p.type==='pebble'){

function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    const tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}

function setupFighters(){
  // キャラの並び順をシャッフルし、先頭（fighters[0]）＝プレイヤーが毎回ランダムに決まるようにする
  const order = shuffleArray(ROSTER_DEF);
  fighters = order.map((def,idx) => makeFighter(Object.assign({}, def, {
    isPlayer: idx===0,
    aiAggro: 0.8+Math.random()*0.6,
  })));
  const n = fighters.length;
  // 出撃位置も毎回ランダム：6方向のスロットをシャッフルして割り当て、
  // さらにスロット内角度と半径を揺らして完全な固定陣形にならないようにする
  const slots = shuffleArray([...Array(n).keys()]);
  for(let i=0;i<n;i++){
    const slot = slots[i];
    const baseAng = -Math.PI/2 + slot*(Math.PI*2/n);
    const ang = baseAng + (Math.random()-0.5)*(Math.PI*2/n)*0.6;
    const rad = WORLD_RMAX*(0.48+Math.random()*0.30);
    const f = fighters[i];

    f.hp=f.maxHp; f.mp=f.maxMp; f.st=f.maxSt;

    f.gold=0;
  }
}

/* ============ Input: Joystick ============ */
const joy = { active:false, id:null, dx:0, dy:0, mag:0 };
const joyZone = document.getElementById('joyZone');
const joyNub = document.getElementById('joyNub');

function joyStart(id, cx, cy){
  joy.active=true; joy.id=id;
  const rect = joyZone.getBoundingClientRect();
  joy.baseX = rect.left+rect.width/2; joy.baseY = rect.top+rect.height/2;
  joy.radius = rect.width/2;
  joyMove(cx,cy);
}
function joyMove(cx,cy){
  if(!joy.active) return;
  let dx = cx-joy.baseX, dy = cy-joy.baseY;
  const d = Math.hypot(dx,dy);
  const max = joy.radius*0.9;
  if(d>max){ dx = dx/d*max; dy = dy/d*max; }
  joy.dx = dx/max; joy.dy = dy/max;
  joy.mag = clamp(d/max,0,1);
  joyNub.style.transform = `translate(${dx}px,${dy}px)`;
}
function joyEnd(){
  joy.active=false; joy.id=null; joy.dx=0; joy.dy=0; joy.mag=0;
  joyNub.style.transform = 'translate(0,0)';
}
joyZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  joyStart(t.identifier, t.clientX, t.clientY);
}, {passive:false});
joyZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier===joy.id) joyMove(t.clientX,t.clientY); }
}, {passive:false});
window.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){ if(t.identifier===joy.id) joyEnd(); }
});
window.addEventListener('touchcancel', e=>{
  for(const t of e.changedTouches){ if(t.identifier===joy.id) joyEnd(); }
});
let joyMouseDown=false;
joyZone.addEventListener('mousedown', e=>{ joyMouseDown=true; joyStart('mouse', e.clientX,e.clientY); });
window.addEventListener('mousemove', e=>{ if(joyMouseDown) joyMove(e.clientX,e.clientY); });
window.addEventListener('mouseup', ()=>{ if(joyMouseDown){ joyMouseDown=false; joyEnd(); } });

const keys = {};
function getKeyboardVector(){
  let dx=0,dy=0;
  if(keys['KeyW']) dy-=1;
  if(keys['KeyS']) dy+=1;
  if(keys['KeyA']) dx-=1;
  if(keys['KeyD']) dx+=1;
  const m=Math.hypot(dx,dy);
  if(m>0){ dx/=m; dy/=m; }
  return {dx,dy};
}
window.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(matchOver || !fightLive) return;
  if(e.code==='KeyJ') doAction('attack');
  if(e.code==='KeyK') doAction('spell');
  if(e.code==='KeyL') doAction('dash');
  if(e.code==='ShiftLeft'||e.code==='ShiftRight'){ if(fighters[0] && fighters[0].alive) fighters[0].blocking=true; }
});
window.addEventListener('keyup', e=>{
  keys[e.code]=false;
  if(e.code==='ShiftLeft'||e.code==='ShiftRight'){ if(fighters[0]) fighters[0].blocking=false; }

/* ============ Input: Action buttons ============ */
const actions = { attack:false, spell:false, dash:false, block:false };
function bindBtn(id, key){
  const el = document.getElementById(id);
  const press = (e)=>{
    e.preventDefault();
    actions[key]=true; el.classList.add('pressed');
    if(matchOver || !fightLive) return;
    if(key==='block'){ if(fighters[0] && fighters[0].alive) fighters[0].blocking=true; }
    else { doAction(key); }
  };
  const release = (e)=>{
    e.preventDefault();
    actions[key]=false; el.classList.remove('pressed');
    if(key==='block' && fighters[0]) fighters[0].blocking=false;
  };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('touchcancel', release, {passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}

/* ============ Combat constants ============ */
const MOVE_SPEED = 232;
const ATK_RANGE = 78;
const ATK_ARC = 1.15; // radians half-arc
const ATK_DMG = 11;
const ATK_STAMINA = 18;
const ATK_COOLDOWN = 0.46;
const ATK_KNOCK = 340;
const ATK_WINDUP = 0.12;
const ATK_ACTIVE = 0.10;
const ATK_RECOVER = 0.20;

const SPELL_DMG = 16;
const SPELL_MANA = 28;
const SPELL_COOLDOWN = 1.1;
const SPELL_SPEED = 430;
const SPELL_KNOCK = 260;
const SPELL_RADIUS = 13;

const DASH_STAMINA = 26;
const DASH_COOLDOWN = 0.9;
const DASH_SPEED = 620;
const DASH_TIME = 0.18;
const DASH_INVULN = 0.20;

const BLOCK_DRAIN = 34; // per second while holding
const KNOCK_FRICTION = 6.0;

/* ============ Hunter (anti-hiding) ============ */
// プレイヤーが一定時間「戦闘（被弾・与ダメージ）」に参加しないと、
// プレイヤーだけを狙う同格の殺人鬼が出現する。隠れ続ける戦略を封じるための仕組み。
const HUNTER_HIDE_TIME = 14;     // この秒数だけ無戦闘が続くと出現
const HUNTER_ESCALATE_AGGRO = 0.15; // 出現回数ごとにAI積極性を少し上げる（無限に隠れ続けるのを防止）
const HUNTER_DEFS = [
  {name:'処刑人',       accent:'#ff1a2b', weapon:'sword',  icon:'☠️'},
  {name:'影の暗殺者',   accent:'#b0163c', weapon:'dagger', icon:'🗡️'},
  {name:'狂った処断者', accent:'#ff4d00', weapon:'axe',    icon:'🪓'},
  {name:'亡者狩り',     accent:'#8a1a6b', weapon:'mace',   icon:'🔨'},
];

/* ============ Player Actions ============ */
function doAction(key){
  const p = fighters[0];
  if(!fightLive || matchOver || !p || !p.alive) return;
  if(key==='attack') tryAttack(p);
  if(key==='spell') tryCast(p);
  if(key==='dash') tryDash(p);
}

function tryAttack(f){
  if(f.state==='attack'||f.state==='cast'||f.state==='dash'||f.state==='hit'||f.hitstun>0) return;
  if(f.atkCooldown>0) return;
  if(f.st < f.atkStamina) return;
  f.st -= f.atkStamina;
  f.state='attack'; f.stateTime=0;
  f.atkCooldown = f.atkCdMax;
  f._attackHit=false;
}

function tryCast(f){
  if(f.state==='attack'||f.state==='cast'||f.state==='dash'||f.state==='hit'||f.hitstun>0) return;
  if(f.spellCooldown>0) return;
  if(f.hasBow){
    if((f.arrowsLeft||0)<=0) return;
  } else if(f.mp < f.spellMana) return;
  if(!f.hasBow) f.mp -= f.spellMana;
  f.state='cast'; f.stateTime=0;
  f.spellCooldown = f.spellCdMax;
  f._castFired=false;
}

function tryDash(f){
  if(f.state==='dash'||f.hitstun>0) return;
  if(f.dashCooldown>0) return;
  if(f.st < DASH_STAMINA) return;
  f.st -= DASH_STAMINA;
  f.state='dash'; f.stateTime=0;
  f.dashCooldown = DASH_COOLDOWN;
  f.invuln = DASH_INVULN;
  f._dashSpeed = DASH_SPEED * getEffectiveMoveMult(f);
  let dx = f.isPlayer? (joy.mag>0.08? joy.dx : getKeyboardVector().dx) : (f._aiDashX||0);
  let dy = f.isPlayer? (joy.mag>0.08? joy.dy : getKeyboardVector().dy) : (f._aiDashY||0);
  const m = Math.hypot(dx,dy);
  if(m<0.1){ dx = f.facing; dy=0; } else { dx/=m; dy/=m; }
  f._dashDirX = dx; f._dashDirY = dy;
}

function fireProjectile(f, target){
  let dx,dy;
  if(target){ dx = target.x-f.x; dy = target.y-f.y; } else { dx = f.facing; dy = 0; }
  const d = Math.hypot(dx,dy)||1;
  const isArrow = f.weapon==='bow';
  const speed = isArrow? SPELL_SPEED*1.4 : SPELL_SPEED;
  projectiles.push({
    x:f.x + (dx/d)*30, y:f.y-14 + (dy/d)*30,
    vx:(dx/d)*speed, vy:(dy/d)*speed,
    owner:f, r: isArrow? 7 : SPELL_RADIUS, life:2.0, color:f.accent,
    isArrow, angle: Math.atan2(dy,dx)
  });
  spawnParticles(f.x,f.y-14,f.accent,isArrow?5:10,140,0.35,isArrow?2:3,0);
  if(f.hasBow){
    f.arrowsLeft = Math.max(0,(f.arrowsLeft||0)-1);
    if(f.arrowsLeft<=0){
      f.hasBow=false;
      f.weapon = f.prevWeapon || f.weapon;
      f.prevWeapon = null;
      if(f.isPlayer) showCenterMsg('矢を撃ち尽くした！', 900);
    }
  }
}

// 「分身」：現在の能力をそのまま受け継いだ仲間を1体だけ呼び出す。
// すでに生きている分身がいれば、増やす代わりに全回復させる。
// 撃破数カウントや馬/エクスカリバー等の唯一枠は複製しない（元の持ち主のものは持ち主のまま）。
function spawnClone(owner){

    owner.allyRef.mp = owner.allyRef.maxMp;

    return;
  }

    x: owner.x + (owner.facing>0? -46:46), y: owner.y,
    isPlayer:false, isAlly:true, ownerRef:owner,
    name: owner.name+'の分身', color:owner.color, accent:owner.accent,
    weapon: (owner.weapon==='excalibur'||owner.weapon==='bow')? (owner.prevWeapon||'sword') : owner.weapon,
    icon: owner.icon,
    hp: owner.maxHp, maxHp: owner.maxHp, mp: owner.maxMp, maxMp: owner.maxMp,
    st: owner.maxSt, maxSt: owner.maxSt,
    atkRange:owner.atkRange, atkDmg:owner.atkDmg, atkStamina:owner.atkStamina,
    atkCdMax:owner.atkCdMax, atkKnock:owner.atkKnock,
    atkWindup:owner.atkWindup, atkActive:owner.atkActive, atkRecover:owner.atkRecover,
    atkStunBonus:owner.atkStunBonus,
    spellDmg:owner.spellDmg, spellMana:owner.spellMana, spellCdMax:owner.spellCdMax,
    spellSlow:owner.spellSlow, spellSlowTime:owner.spellSlowTime,
    moveSpeedMult:owner.moveSpeedMult, defenseMult:owner.defenseMult,
  });
  owner.allyRef = ally;

/* ============ Targeting ============ */
function computeTargets(){
  for(const f of fighters){
    if(!f.alive){ f._target=null; continue; }
    if(f.isHunter){
      // 殺人鬼は他の闘士には目もくれず、プレイヤーだけを狩り続ける。
      // プレイヤーが家に隠れている場合は、家そのものを標的にして叩き壊しにかかる。
      const p = fighters[0];
      let nt = (p && p.alive)? p : null;
      if(nt && nt.hidingIn && nt.hidingIn.alive) nt = nt.hidingIn;
      if(nt && nt.type==='building' && f._target!==nt){
        showCenterMsg('殺人鬼が隠れ家を破壊しようとしている！', 1300);
      }
      f._target = nt;
      continue;
    }
    if(f.isElf){
      // エルフの弓兵は森を壊した主人公だけを執拗に狙う。隠れても、隠れ家ごと射抜く。
      const p = fighters[0];
      let nt = (p && p.alive)? p : null;
      if(nt && nt.hidingIn && nt.hidingIn.alive) nt = nt.hidingIn;
      f._target = nt;
      continue;
    }
    if(f.isAlly){
      // 分身はプレイヤー(所有者)と他の分身を狙わず、本当の敵だけを狙う。
      // 生きて動いている敵がいなければ、隠れている敵の家を代わりに狙う。
      let best=null, bestScore=-Infinity;
      let hiddenBest=null, hiddenBestScore=-Infinity;
      for(const o of fighters){
        if(o===f || !o.alive || o.isPlayer || o.isAlly) continue;
        const d = dist(f.x,f.y,o.x,o.y);
        let score = -d;
        if(o.isKiller) score += 4000;
        if(o.hidingIn){
          if(score>hiddenBestScore){ hiddenBestScore=score; hiddenBest=o; }
          continue;
        }
        if(score>bestScore){ bestScore=score; best=o; }
      }
      f._target = best || ((hiddenBest && hiddenBest.hidingIn && hiddenBest.hidingIn.alive)? hiddenBest.hidingIn : null);
      continue;
    }
    // 通常の戦闘士：生きて動いている敵を優先して狙うが、
    // それが誰もいない（残る相手が隠れているだけ）場合は隠れ家を破壊しに向かう。
    let best=null, bestScore=-Infinity;
    let hiddenBest=null, hiddenBestScore=-Infinity;
    for(const o of fighters){
      if(o===f || !o.alive) continue;
      const d = dist(f.x,f.y,o.x,o.y);
      let score = -d;
      if(o.isKiller) score += 4000; // 村人殺しは全員から集中的に狙われる
      if(o.hidingIn){
        if(score>hiddenBestScore){ hiddenBestScore=score; hiddenBest=o; }
        continue;
      }
      if(score>bestScore){ bestScore=score; best=o; }
    }
    f._target = best || ((hiddenBest && hiddenBest.hidingIn && hiddenBest.hidingIn.alive)? hiddenBest.hidingIn : null);
  }
}

/* ============ Hunter watch (anti-hiding) ============ */
function updateHunterWatch(dt){
  if(championStage) return; // チャンピオン戦中は殺人鬼を出現させない
  const p = fighters[0];
  if(!p || !p.alive) return;
  playerCombatTimer += dt;
  if(playerCombatTimer < HUNTER_HIDE_TIME) return;
  const alreadyOut = fighters.some(f=>f.isHunter && f.alive);
  if(alreadyOut) return;
  spawnHunter();
  playerCombatTimer = 0; // 次の殺人鬼まで、また同じだけ隠れ続ける必要がある
}

function spawnHunter(){
  const p = fighters[0];
  if(!p) return;
  const def = HUNTER_DEFS[hunterSpawnCount % HUNTER_DEFS.length];
  hunterSpawnCount++;
  const h = makeFighter({
    name: def.name, color:'#241414', accent: def.accent, weapon: def.weapon, icon: def.icon,
    isPlayer:false, isHunter:true,
    aiAggro: Math.min(1.4 + hunterSpawnCount*HUNTER_ESCALATE_AGGRO, 2.4),
  });
  // プレイヤーの少し外側、闘技場の縁近くから現れる
  const ang = Math.random()*Math.PI*2;
  const spawnDist = Math.min(dist(p.x,p.y,arena.cx,arena.cy)+380, arena.r*0.95);
  h.x = arena.cx + Math.cos(ang)*spawnDist;
  h.y = arena.cy + Math.sin(ang)*spawnDist;
  h.facing = (p.x < h.x)? -1 : 1;
  fighters.push(h);
  aliveCount++;
  addRosterItem(fighters.length-1);
  showCenterMsg('殺人鬼が気配を察知した…', 1400);
  addShake(6);
}

/* ============ AI ============ */
// エルフの弓兵：常に主人公との距離を測り、近すぎれば下がり、遠すぎれば詰め、
// ちょうど良い間合いでは左右に回り込みながら矢を撃つ「ヒットアンドアウェイ」型AI。
function updateElfAI(f, dt){
  if(f.state==='hit'||f.hitstun>0){ f._aiMoveX=0; f._aiMoveY=0; return; }
  const t = f._target;
  const canAct = f.state==='idle'||f.state==='walk';
  const fdc = dist(f.x,f.y,arena.cx,arena.cy);

  if(fdc > arena.r*0.82){
    const dc = fdc||1;
    const mx=(arena.cx-f.x)/dc, my=(arena.cy-f.y)/dc;
    f._aiMoveX=mx; f._aiMoveY=my;
    return;
  }
  if(!t || !t.alive){ f._aiMoveX=0; f._aiMoveY=0; return; }

  const dx=t.x-f.x, dy=t.y-f.y;
  const d=Math.hypot(dx,dy)||1;
  const nx=dx/d, ny=dy/d;
  if(Math.abs(dx)>4) f.facing = dx>0?1:-1;

  const TOO_CLOSE = 230;   // これより近づかれたら弓兵は下がる
  const IDEAL_MAX = 400;   // これより遠いと詰めてくる

  if(!f._kiteTimer || f._kiteTimer<=0){
    f._kiteTimer = 1.0+Math.random()*1.4;
    f._kiteDir = Math.random()<0.5? 1 : -1;
  }
  f._kiteTimer -= dt;

  let mx=0, my=0;
  if(d < TOO_CLOSE){
    // 距離を取るために後退しつつ横にもそれる（ヒットアンドアウェイの「アウェイ」）
    mx = -nx + ny*0.6*f._kiteDir;
    my = -ny - nx*0.6*f._kiteDir;
  } else if(d > IDEAL_MAX){
    // 射程外まで離されたら少し詰める
    mx = nx; my = ny;
  } else {
    // 好ましい間合い内：円を描くように横移動しながら牽制射撃
    mx = nx*0.12 + ny*0.95*f._kiteDir;
    my = ny*0.12 - nx*0.95*f._kiteDir;
  }
  const mmag = Math.hypot(mx,my)||1;
  f._aiMoveX = mx/mmag; f._aiMoveY = my/mmag;

  if(canAct && d < 460 && f.spellCooldown<=0 && f.mp>=f.spellMana && Math.random()<0.07*f.aiAggro){
    tryCast(f);
  }
}

// 家に隠れている間、いつ外に出るかを決める（一定時間ごとに外の様子を見に出る）
function updateHiderExitAI(f, dt){
  f._hideTimer = (f._hideTimer!==undefined? f._hideTimer : HOUSE_MIN_HIDE) - dt;
  if(f._hideTimer<=0){
    f._aiMoveX = 1; f._aiMoveY = 0; // 動く意思があれば方向を問わず退出トリガーになる
  } else {
    f._aiMoveX = 0; f._aiMoveY = 0;
  }
}

function updateAI(f, dt){
  if(f.hidingIn){ updateHiderExitAI(f, dt); return; }
  if(f.isElf){ updateElfAI(f, dt); return; }
  if(f.state==='hit'||f.hitstun>0){ f._aiMoveX=0; f._aiMoveY=0; return; }
  const t = f._target;
  const canAct = f.state==='idle'||f.state==='walk';
  const fdc = dist(f.x,f.y,arena.cx,arena.cy);
  const nearEdge = fdc > arena.r*0.82;

  // 体力が低く、敵がすぐ近くにいなければ、まれに家へ逃げ込んで隠れようとする
  if(!nearEdge && f.hp < f.maxHp*0.32 && !f.isHunter && !f.isChampion){
    if(f._hideSeekCd>0) f._hideSeekCd -= dt;
    const threatD = (t && t.alive)? dist(f.x,f.y,t.x,t.y) : Infinity;
    if(threatD > 90 && (!f._hideSeekCd || f._hideSeekCd<=0) && !f._seekHouse && Math.random()<0.02){
      const house = findNearestAliveBuilding(f.x, f.y, HOUSE_SEEK_RADIUS);
      if(house){ f._seekHouse = house; f._hideSeekCd = 6+Math.random()*4; }
    }
  }
  if(f._seekHouse){
    if(!f._seekHouse.alive){
      f._seekHouse = null;
    } else {
      const doorPt = buildingDoorPos(f._seekHouse);
      const dxh = doorPt.x-f.x, dyh = doorPt.y-f.y;
      const ddh = Math.hypot(dxh,dyh)||1;
      if(Math.abs(dxh)>4) f.facing = dxh>0?1:-1;
      f._aiMoveX = dxh/ddh; f._aiMoveY = dyh/ddh;
      return; // 家に到達し次第、衝突判定側で自動的に隠れる
    }
  }

  if(nearEdge){
    const dc = fdc||1;
    const mx = (arena.cx-f.x)/dc, my = (arena.cy-f.y)/dc;
    if(canAct && f.dashCooldown<=0 && f.st>DASH_STAMINA){
      f._aiDashX=mx; f._aiDashY=my;
      tryDash(f);
    }
    f._aiMoveX = mx; f._aiMoveY = my;
    return;
  }

  // 接近戦の最中でなければ、薬草・馬・エクスカリバーを積極的に奪いに行く
  const targetD = (t && t.alive)? dist(f.x,f.y,t.x,t.y) : Infinity;
  if(targetD > f.atkRange*1.5 && !(t && t.type==='building')){
    const itemGoal = findDesirableItem(f, ITEM_SEEK_RADIUS);
    if(itemGoal){
      const dx = itemGoal.x-f.x, dy = itemGoal.y-f.y;
      const d = Math.hypot(dx,dy)||1;
      if(Math.abs(dx)>4) f.facing = dx>0?1:-1;
      f._aiMoveX = dx/d; f._aiMoveY = dy/d;
      return;
    }
  }

  if(!t || !t.alive){ f._aiMoveX=0; f._aiMoveY=0; return; }
  const dx = t.x-f.x, dy=t.y-f.y;
  const d = Math.hypot(dx,dy)||1;
  const nx = dx/d, ny=dy/d;
  const hunt = t.isKiller? 1.7 : 1; // 村人殺しは全員から集中攻撃される

  let mx=0,my=0;

  if(d>260){
    mx = nx; my = ny;
    if(canAct && f.spellCooldown<=0 && f.mp>=f.spellMana && Math.random()<0.02*f.aiAggro*hunt){
      tryCast(f);
    }
  } else if(d>f.atkRange*0.85){
    mx=nx; my=ny;
    if(canAct && f.spellCooldown<=0 && f.mp>=f.spellMana && Math.random()<0.035*f.aiAggro*hunt){
      tryCast(f);
    }
  } else {
    mx = nx*0.15; my = ny*0.15;
    if(canAct && f.atkCooldown<=0 && f.st>=f.atkStamina && Math.random()<0.045*f.aiAggro*hunt){
      tryAttack(f);
    } else if(canAct && Math.random()<0.006 && f.st>=DASH_STAMINA && f.dashCooldown<=0){
      f._aiDashX=-nx; f._aiDashY=-ny;
      tryDash(f);
    }
  }
  if(canAct && t.state==='attack' && d<t.atkRange*1.3 && Math.random()<0.5*f.aiAggro){
    f.blocking = true;
  } else if(f.state!=='block'){
    f.blocking = Math.random()<0.01 ? f.blocking : (f.blocking && Math.random()<0.7);
  }
  f._aiMoveX = mx; f._aiMoveY = my;
}

/* ============ Update Fighter ============ */
function updateFighter(f, dt){
  if(f.hidingIn){
    // 家に隠れている間：クールダウンだけ進行し、攻撃・被弾は発生しない。
    if(f.atkCooldown>0) f.atkCooldown -= dt;
    if(f.spellCooldown>0) f.spellCooldown -= dt;
    if(f.dashCooldown>0) f.dashCooldown -= dt;
    f.st = clamp(f.st + dt*20, 0, f.maxSt);
    f.mp = clamp(f.mp + dt*8, 0, f.maxMp);
    if(!f.hidingIn.alive){ exitHouse(f); return; } // 家が既に失われていたら安全のため退避
    if(f._hideEnterGrace===undefined) f._hideEnterGrace = 0;
    if(f._hideEnterGrace>0){
      f._hideEnterGrace -= dt;
    } else {
      let mx=0, my=0;
      if(f.isPlayer){
        if(joy.mag>0.08){ mx=joy.dx; my=joy.dy; }
        else { const kv=getKeyboardVector(); mx=kv.dx; my=kv.dy; }
      } else {
        mx = f._aiMoveX||0; my = f._aiMoveY||0;
      }
      if(Math.hypot(mx,my) > HOUSE_EXIT_MOVE_THRESHOLD){
        exitHouse(f);
      }
    }
    return;
  }
  f.animT += dt;
  if(f.atkCooldown>0) f.atkCooldown -= dt;
  if(f.spellCooldown>0) f.spellCooldown -= dt;
  if(f.dashCooldown>0) f.dashCooldown -= dt;
  if(f.invuln>0) f.invuln -= dt;
  if(f.hitstun>0) f.hitstun -= dt;
  if(f.slowTimer>0){
    f.slowTimer -= dt;
    if(f.slowTimer<=0){ f.slowTimer=0; if(f.isPlayer) showCenterMsg('足の滑りが治まった', 700); }
  }
  if(f.poisonTimer>0 && f.alive){
    f.poisonTimer -= dt;
    f.hp = clamp(f.hp - f.poisonDps*dt, 0, f.maxHp);
    if(Math.random()<0.2) spawnParticles(f.x,f.y-10,'#8ee06b',1,40,0.3,2,10);
    if(f.hp<=0){
      f.state='dead';
      eliminate(f, 'hp');
    } else if(f.poisonTimer<=0){
      f.poisonTimer=0; f.poisonDps=0;
      if(f.isPlayer) showCenterMsg('毒が抜けた', 700);
    }
  }
  if(f.herbAutoCd>0) f.herbAutoCd -= dt;
  if(f.manaAutoCd>0) f.manaAutoCd -= dt;
  if(f.alive && (f.herbStock||0)>0 && f.hp>0 && f.hp<=f.maxHp*AUTO_HEAL_HP_RATIO && f.herbAutoCd<=0){
    f.herbStock--;
    f.hp = clamp(f.hp + f.maxHp*HERB_HEAL_RATIO, 0, f.maxHp);
    f.herbAutoCd = AUTO_USE_COOLDOWN;
    spawnParticles(f.x,f.y-20, ITEM_DEFS.herb.color, 14,120,0.4,3,10);
    if(f.isPlayer) showCenterMsg('薬草を自動使用！(残り'+f.herbStock+')', 900);
  }
  if(f.alive && (f.manaStock||0)>0 && f.mp<=f.maxMp*AUTO_MANA_RATIO && f.manaAutoCd<=0){
    f.manaStock--;
    f.mp = clamp(f.mp + f.maxMp*MANA_RESTORE_RATIO, 0, f.maxMp);
    f.manaAutoCd = AUTO_USE_COOLDOWN;
    spawnParticles(f.x,f.y-20, ITEM_DEFS.mana.color, 14,120,0.4,3,10);
    if(f.isPlayer) showCenterMsg('魔力の雫を自動使用！(残り'+f.manaStock+')', 900);
  }
  if(f.mounted && Math.hypot(f.vx,f.vy)>40 && Math.random()<0.35){
    spawnParticles(f.x, f.y+16, '#9a7a55', 1, 40, 0.3, 2, 20);
  }

  if(!f.blocking) f.st = clamp(f.st + dt*20, 0, f.maxSt);
  else f.st = clamp(f.st - dt*BLOCK_DRAIN*(f.blockPower||1), 0, f.maxSt);
  f.mp = clamp(f.mp + dt*8, 0, f.maxMp);
  if(f.st<=0) f.blocking=false;

  f.stateTime += dt;

  let mx=0,my=0;
  if(f.isPlayer){
    if(joy.mag>0.08){ mx=joy.dx; my=joy.dy; }
    else { const kv=getKeyboardVector(); mx=kv.dx; my=kv.dy; }
  } else {
    mx = f._aiMoveX||0; my = f._aiMoveY||0;
  }

  if(f.state==='idle' || f.state==='walk'){
    if(f.blocking && f.hitstun<=0){
      f.vx=0; f.vy=0; f.state='idle';
    } else if(f.hitstun<=0){
      const mag = clamp(Math.hypot(mx,my),0,1);
      if(mag>0.08){
        const _spd = getEffectiveMoveMult(f);
        f.vx = (mx/(Math.hypot(mx,my)||1)) * MOVE_SPEED * _spd * mag;
        f.vy = (my/(Math.hypot(mx,my)||1)) * MOVE_SPEED * _spd * mag;
        f.state='walk';
        if(Math.abs(mx)>0.05) f.facing = mx>0?1:-1;
      } else {
        f.vx=0; f.vy=0; f.state='idle';
      }
    }
  }

  const target = f._target;

  if(f.state==='attack'){
    f.vx*=0.8; f.vy*=0.8;
    if(f.stateTime>=f.atkWindup && !f._attackHit){
      f._attackHit = true;
      const facingAng = f.facing>0?0:Math.PI;
      let hitAny=false;
      for(const other of fighters){
        if(other===f || !other.alive || other.hidingIn) continue;
        const d = dist(f.x,f.y,other.x,other.y);
        if(d>=f.atkRange) continue;
        const ang = Math.atan2(other.y-f.y, other.x-f.x);
        const diff = Math.abs(Math.atan2(Math.sin(ang-facingAng), Math.cos(ang-facingAng)));
        if(diff < ATK_ARC){
          applyHit(other, f, f.atkDmg, f.atkKnock, false);
          hitAny=true;
        }
      }
      for(const o of obstacles){
        if(!o.alive) continue;
        const d = dist(f.x,f.y,o.x,o.y);
        if(d>=f.atkRange) continue;
        const ang = Math.atan2(o.y-f.y, o.x-f.x);
        const diff = Math.abs(Math.atan2(Math.sin(ang-facingAng), Math.cos(ang-facingAng)));
        if(diff < ATK_ARC && !o.indestructible){
          damageObstacle(o, f.atkDmg, f);
          hitAny=true;
        }
      }
      if(hitAny) addShake(6);
    }
    if(f.stateTime >= f.atkWindup+f.atkActive+f.atkRecover){ f.state='idle'; f.stateTime=0; }
  }
  else if(f.state==='cast'){
    f.vx*=0.7; f.vy*=0.7;
    if(f.stateTime>=0.22 && !f._castFired){
      fireProjectile(f, target);
      f._castFired = true;
    }
    if(f.stateTime>=0.42){ f.state='idle'; f.stateTime=0; }
  }
  else if(f.state==='dash'){
    f.vx = f._dashDirX*(f._dashSpeed||DASH_SPEED);
    f.vy = f._dashDirY*(f._dashSpeed||DASH_SPEED);
    if(f.stateTime>=DASH_TIME){ f.state='idle'; f.stateTime=0; f.vx*=0.3; f.vy*=0.3; }
  }
  else if(f.state==='hit'){
    if(f.hitstun<=0){ f.state='idle'; f.stateTime=0; }
  }

  if(f.state!=='dash' && target){
    const dx = target.x-f.x;
    if(Math.abs(dx) > 4) f.facing = dx>0?1:-1;
  }

  f.x += (f.vx + f.knockVx) * dt;
  f.y += (f.vy + f.knockVy) * dt;
  f.knockVx *= Math.max(0, 1 - KNOCK_FRICTION*dt);
  f.knockVy *= Math.max(0, 1 - KNOCK_FRICTION*dt);
}

function resolveCollisions(){
  const minD = 46;
  for(let i=0;i<fighters.length;i++){
    const a = fighters[i]; if(!a.alive || a.hidingIn) continue;
    for(let j=i+1;j<fighters.length;j++){
      const b = fighters[j]; if(!b.alive || b.hidingIn) continue;
      const od = dist(a.x,a.y,b.x,b.y);
      if(od < minD && od>0.01){
        const push = (minD-od)/2;
        const nx = (a.x-b.x)/od, ny=(a.y-b.y)/od;
        a.x += nx*push; a.y += ny*push;
        b.x -= nx*push; b.y -= ny*push;
      }
    }
  }
}

function applyHit(target, attacker, dmg, knock, isSpell){
  if(target.invuln>0 || !target.alive || target.hidingIn) return;
  if(target.isPlayer || (attacker && attacker.isPlayer)) playerCombatTimer = 0; // プレイヤーが戦闘に参加した
  const dx = target.x-attacker.x, dy=target.y-attacker.y;
  const d = Math.hypot(dx,dy)||1;
  let actualDmg = dmg * (target.defenseMult||1);
  let actualKnock = knock;
  const isBlockingNow = target.blocking && target.st>0 && (target.state==='idle'||target.state==='walk');
  if(isBlockingNow){
    const bp = target.blockPower||1; // 盾入手で1未満になり、防御性能が上がる
    actualDmg *= 0.22*bp;
    actualKnock *= 0.35*bp;
    target.st = clamp(target.st-10*bp,0,target.maxSt);
    spawnParticles(target.x,target.y-20,'#cfe8ff',8,90,0.3,2,0);
    addShake(3);
  } else {
    target.state='hit'; target.stateTime=0;
    // 通常のよろけ(0.28秒)に加え、攻撃側の武器が追加スタンを持っていれば上乗せする（氷帝の剣など）
    target.hitstun = 0.28 + (!isSpell ? (attacker.atkStunBonus||0) : 0);
    spawnParticles(target.x,target.y-20, isSpell? attacker.accent : '#ff5555', 14,160,0.4,3,60);
    addShake(isSpell?8:5);
    // 魔法が鈍足効果を持っていれば、命中した対象を氷結させて足を鈍らせる（氷帝の魔法など）
    if(isSpell && attacker.spellSlow){
      target.slowTimer = Math.max(target.slowTimer, attacker.spellSlowTime||POOP_SLOW_TIME);
      if(target.isPlayer) showCenterMsg('氷の魔法で足が凍りついた…', 900);
    }
    // 毒の短剣を持つ相手の（魔法ではない）攻撃が命中すると猛毒を付与する
    if(!isSpell && attacker.hasVenom){
      target.poisonTimer = VENOM_POISON_TIME;
      target.poisonDps = VENOM_POISON_DPS;
      if(target.isPlayer) showCenterMsg('毒を受けた…体力が徐々に減る', 900);
    }
  }
  target.hp = clamp(target.hp-actualDmg,0,target.maxHp);
  target.knockVx += (dx/d)*actualKnock;
  target.knockVy += (dy/d)*actualKnock;

  if(target.hp<=0 && target.alive){
    target.state='dead';
    eliminate(target, 'hp');
  }
}

/* ============ Elimination / match end ============ */
function eliminate(f, cause){
  if(!f.alive || matchOver) return;
  f.alive = false;
  f.placement = aliveCount;
  if(!f.isAlly) aliveCount--; // 分身は勝敗判定上の「残り人数」には数えない
  if(cause==='hp'){
    graves.push({x:f.x,y:f.y,name:f.name});
    const goldAmt = GOLD_KILL_MIN + Math.floor(Math.random()*(GOLD_KILL_MAX-GOLD_KILL_MIN+1));
    dropItemAt('gold', f.x, f.y, {amount:goldAmt});
    if(f.mounted) dropItemAt('horse', f.x, f.y);
    if(f.hasExcalibur) dropItemAt('excalibur', f.x, f.y);
    if(f.hasHelmet) dropItemAt('helmet', f.x, f.y);
    if(f.hasVenom) dropItemAt('venom', f.x, f.y);
    if(f.hasShield) dropItemAt('shield', f.x, f.y);
    if(f.hasWand) dropItemAt('wand', f.x, f.y);
    if(f.hasBow) dropItemAt('bow', f.x, f.y);
  }
  if(f.isChampion){
    const bossPanel = document.getElementById('bossPanel');
    if(bossPanel) bossPanel.style.display = 'none';
  }
  checkMatchEnd();
}

function checkMatchEnd(){
  if(matchOver) return;
  const player = fighters[0];
  if(!player.alive){
    matchOver = true;
    finishSequence(false, player.placement);
    return;
  }
  if(aliveCount<=1){
    if(!villagersTurnedHunter){
      const livingVillagers = obstacles.filter(o=>o.type==='villager' && o.alive);
      if(livingVillagers.length>0){
        turnVillagersIntoHunters(livingVillagers);
        return; // 村人が殺人鬼として蘇るため、まだ勝利ではない
      }
      villagersTurnedHunter = true;
    }
    if(!championStage){
      startChampionDuel();
      return; // 生き残っただけではまだ真の勝利ではない。氷帝とのタイマンが待つ
    }
    player.placement = 1;
    matchOver = true;
    finishSequence(true, 1);
  }
}

function finishSequence(playerWon, placement){
  fightLive = false;
  const label = playerWon
    ? (championStage? '氷帝、撃破！' : '勝利！')
    : (championStage? '氷帝に敗れた…' : '敗北…');
  showCenterMsg(label, 1400, ()=>{ finishMatch(playerWon, placement); });
}

function finishMatch(playerWon, placement){
  const endOverlay = document.getElementById('endOverlay');
  const endTitle = document.getElementById('endTitle');
  const endSub = document.getElementById('endSub');
  endTitle.textContent = playerWon
    ? 'VICTORY — 1位'
    : (championStage? 'DEFEAT — 氷帝に敗北' : `DEFEAT — ${placement}位`);
  endTitle.className = playerWon? 'win':'lose';
  if(playerWon){
    endSub.textContent = '五人の強敵を退け、さらに闘技場の頂点チャンピオン「氷帝」との死闘を制した。血と氷に彩られた灰の剣士の名は、いま伝説となる。';
  } else if(championStage){
    endSub.textContent = '五人の強敵を退けてなお、チャンピオン「氷帝」の刃と氷の魔法には届かなかった。骨は闘技場に沈むが、記憶はまだ消えない――次こそ頂点へ。';
  } else {
    endSub.textContent = `${placement}位で力尽きた。骨は闘技場に沈むが、記憶はまだ消えない――次こそ頂点へ。`;
  }
  endOverlay.style.display='flex';
}
