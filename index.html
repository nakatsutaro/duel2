/* ============ Projectiles ============ */
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const pr = projectiles[i];
    pr.life -= dt;
    pr.x += pr.vx*dt; pr.y += pr.vy*dt;
    if(Math.random()<0.6) spawnParticles(pr.x,pr.y,pr.color,1,30,0.25,2,0);
    let hit=false;
    for(const f of fighters){
      if(f===pr.owner || !f.alive || f.hidingIn) continue;
      if(dist(pr.x,pr.y,f.x,f.y) < pr.r+18){
        applyHit(f, pr.owner, pr.owner.spellDmg||16, SPELL_KNOCK, true);
        spawnParticles(pr.x,pr.y,pr.color,20,180,0.4,4,0);
        hit=true;
        break;
      }
    }
    if(!hit){
      for(const o of obstacles){
        if(!o.alive) continue;
        if(dist(pr.x,pr.y,o.x,o.y) < pr.r+o.r){
          if(!o.indestructible) damageObstacle(o, pr.owner.spellDmg||16, pr.owner);
          spawnParticles(pr.x,pr.y,pr.color,16,160,0.4,4,0);
          hit=true;
          break;
        }
      }
    }
    if(hit){ projectiles.splice(i,1); continue; }
    if(pr.life<=0 || dist(pr.x,pr.y,arena.cx,arena.cy) > WORLD_RMAX*1.6){
      projectiles.splice(i,1);
    }
  }
}

/* ============ Pit / ring-out check ============ */
function checkPitFall(f){
  if(!f.alive || f.hidingIn) return;
  const d = dist(f.x,f.y,arena.cx,arena.cy);
  if(d > arena.r + 6){
    f.state='fall';
    spawnParticles(f.x,f.y,'#ff8a3d',40,220,0.9,5,40);
    addShake(f.isPlayer?16:8);
    eliminate(f,'fall');
  }
}

/* ============ Camera ============ */
function updateCamera(dt){
  const player = fighters[0];
  let focus = (player && player.alive)? player : (fighters.find(f=>f.alive) || player);
  if(!focus) return;
  const k = Math.min(1, dt*5);
  camera.x += (focus.x-camera.x)*k;
  camera.y += (focus.y-camera.y)*k;
}

/* ============ Rendering ============ */
function drawSceneBackground(){
  const grad = ctx.createRadialGradient(W/2,H*0.42,40, W/2,H*0.42, Math.max(W,H)*0.95);
  grad.addColorStop(0,'#1c1613');
  grad.addColorStop(0.55,'#140f0d');
  grad.addColorStop(1,'#0b0908');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function drawBoundaryRunes(t){
  if(matchTimer < SAFE_TIME-6) return;
  const warn = clamp((matchTimer-(SAFE_TIME-6))/6,0,1);
  const N=20;
  for(let i=0;i<N;i++){
    const ang = i/N*Math.PI*2 + t*0.0002;
    const rx = Math.cos(ang)*arena.r, ry=Math.sin(ang)*arena.r;
    ctx.save();
    ctx.translate(rx,ry);
    ctx.rotate(ang+t*0.0006);
    ctx.globalAlpha = warn*(0.4+Math.sin(t*0.004+i)*0.25);
    ctx.strokeStyle='#b98cff';
    ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(0,-6); ctx.lineTo(4,0); ctx.lineTo(0,6); ctx.lineTo(-4,0); ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawArenaWorld(t){
  // abyss fill
  ctx.fillStyle = '#0b0908';
  ctx.beginPath(); ctx.arc(0,0, WORLD_RMAX*1.8, 0, Math.PI*2); ctx.fill();

  // molten band outside the current safe radius
  ctx.save();
  ctx.beginPath();
  ctx.arc(0,0, WORLD_RMAX*1.8,0,Math.PI*2);
  ctx.arc(0,0, arena.r, 0, Math.PI*2, true);
  ctx.clip('evenodd');
  const lavaGrad = ctx.createRadialGradient(0,0,arena.r*0.9,0,0,arena.r*1.8);
  lavaGrad.addColorStop(0,'#ff7a2e');
  lavaGrad.addColorStop(0.25,'#a5230f');
  lavaGrad.addColorStop(0.6,'#3a0e08');
  lavaGrad.addColorStop(1,'#0b0908');
  ctx.fillStyle = lavaGrad;
  ctx.fillRect(-WORLD_RMAX*2,-WORLD_RMAX*2,WORLD_RMAX*4,WORLD_RMAX*4);
  for(let i=0;i<6;i++){
    const rr = arena.r*(1.05+i*0.14) + Math.sin(t*0.001+i)*6;
    ctx.strokeStyle = `rgba(255,${120-i*10},40,${0.12-i*0.015})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0,0,rr,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();

  // embers
  for(const e of embers){
    if(e.rr===undefined) e.rr = arena.r*(1.0+Math.random()*0.5);
    const ex = Math.cos(e.a)*e.rr;
    const ey = Math.sin(e.a)*e.rr*0.55 + (1-e.life)* -60;
    ctx.globalAlpha = e.life*0.8;
    ctx.fillStyle = '#ffb066';
    ctx.beginPath(); ctx.arc(ex,ey,e.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  drawTorches(t);

  // platform
  ctx.save();
  ctx.beginPath();
  ctx.arc(0,0,arena.r,0,Math.PI*2);
  const stoneGrad = ctx.createRadialGradient(0,-arena.r*0.3,10,0,0,arena.r);
  stoneGrad.addColorStop(0,'#3a322b');
  stoneGrad.addColorStop(0.7,'#241d18');
  stoneGrad.addColorStop(1,'#140f0c');
  ctx.fillStyle = stoneGrad;
  ctx.fill();
  ctx.restore();

  // rim glow
  ctx.beginPath();
  ctx.arc(0,0,arena.r,0,Math.PI*2);
  ctx.lineWidth=5;
  ctx.strokeStyle='rgba(255,120,50,0.55)';
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0,0,arena.r-3,0,Math.PI*2);
  ctx.lineWidth=2;
  ctx.strokeStyle='rgba(0,0,0,0.6)';
  ctx.stroke();

  drawBoundaryRunes(t);

  // ground dressing, clipped to the current platform
  ctx.save();
  ctx.beginPath(); ctx.arc(0,0,arena.r,0,Math.PI*2); ctx.clip();
  for(const p of groundProps){
    if(Math.hypot(p.x,p.y) > arena.r+20) continue;
    drawGroundProp(p);
  }
  ctx.strokeStyle='rgba(255,180,120,0.10)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,arena.r*0.6,0,Math.PI*2); ctx.stroke();
  drawGraves();
  ctx.restore();
}

function drawObstacleShadow(o){
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(o.x, o.y+o.r*0.55, o.r*0.85, o.r*0.32, 0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBuilding(o){
  ctx.save();
  ctx.translate(o.x, o.y);
  const w=o.r*1.8, h=o.r*1.4;
  const occupied = !!(o.occupants && o.occupants.length>0);
  const damaged = o.hp < o.maxHp;
  const shop = !!o.isShop;
  ctx.fillStyle = damaged? (shop? '#2e2712':'#302620') : (shop? '#3a3016':'#3a2f26');
  ctx.fillRect(-w/2, -h*0.55, w, h*0.85);
  ctx.strokeStyle = shop? 'rgba(180,140,30,0.65)' : 'rgba(0,0,0,0.55)';
  ctx.lineWidth=2;
  ctx.strokeRect(-w/2, -h*0.55, w, h*0.85);
  ctx.fillStyle = shop? '#4a3a12' : '#241a14';
  ctx.beginPath();
  ctx.moveTo(-w/2-10, -h*0.55);
  ctx.lineTo(0, -h*1.15);
  ctx.lineTo(w/2+10, -h*0.55);
  ctx.closePath();
  ctx.fill();
  // 被弾によるひび割れ（あと1回で崩壊する状態を見た目で示す）
  if(damaged){
    ctx.strokeStyle = 'rgba(0,0,0,.65)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-w*0.18,-h*0.5); ctx.lineTo(w*0.04,-h*0.12); ctx.lineTo(-w*0.06,h*0.22);
    ctx.stroke();
  }
  // 窓
  ctx.fillStyle = shop? 'rgba(255,210,80,0.7)' : 'rgba(255,150,60,0.55)';
  ctx.fillRect(-6,-h*0.28,12,12);
  // 店の看板（金貨マーク）
  if(shop){
    ctx.font='15px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#000'; ctx.shadowBlur=3;
    ctx.fillStyle='#ffd75e';
    ctx.fillText('💰', 0, -h*0.98);
  }
  // 正面入口（ドア）：画面下側の壁の中央
  const doorW=16, doorH=18;
  const doorY = h*0.3 - doorH;
  ctx.fillStyle = '#171310';
  ctx.fillRect(-doorW/2, doorY, doorW, doorH);
  if(occupied){
    // 誰かが隠れている印：ドアの明かりが脈動し、外からもそれが分かる
    const glow = 0.5+Math.sin(performance.now()*0.006+o.seed)*0.4;
    ctx.fillStyle = `rgba(255,205,100,${clamp(glow,0.3,0.95)})`;
    ctx.fillRect(-doorW/2+2.5, doorY+2.5, doorW-5, doorH-5);
    ctx.font='12px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle='rgba(255,235,190,.95)';
    ctx.shadowColor='#000'; ctx.shadowBlur=3;
    ctx.fillText('👀', 0, -h*0.66);
  } else {
    ctx.fillStyle = 'rgba(255,180,90,0.25)';
    ctx.fillRect(-doorW/2+2.5, doorY+2.5, doorW-5, doorH-5);
  }
  ctx.restore();
}

function drawTree(o){
  ctx.save();
  ctx.translate(o.x,o.y);
  const dmgT = clamp(o.hp/o.maxHp,0,1);
  ctx.fillStyle='#4a3220';
  ctx.fillRect(-4,-8,8,28);
  const green = dmgT<0.4? '#5f6b3a' : '#3f6b2f';
  ctx.fillStyle = green;
  ctx.beginPath(); ctx.arc(0,-24,o.r,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-o.r*0.55,-14,o.r*0.62,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(o.r*0.55,-14,o.r*0.62,0,Math.PI*2); ctx.fill();
  if(dmgT<1){
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-o.r,-o.r*2-14,o.r*2,3);
    ctx.fillStyle='#8fbf5a'; ctx.fillRect(-o.r+0.5,-o.r*2-13.5, (o.r*2-1)*dmgT,2);
  }
  ctx.restore();
}

function drawVillager(o){
  ctx.save();
  ctx.translate(o.x,o.y);
  const fleeing = o.vx*o.vx+o.vy*o.vy > (VILLAGER_SPEED*0.5)*(VILLAGER_SPEED*0.5);
  const bob = fleeing? Math.sin(o.seed*3+performance.now()*0.02)*3 : 0;
  // legs + feet
  const legSwing = fleeing? Math.sin(o.seed*3+performance.now()*0.02*5)*3 : 0;
  ctx.fillStyle = '#5a4a38';
  ctx.beginPath();
  ctx.ellipse(-4+legSwing*0.3,6+bob*0.3,3.6,6.5,0,0,Math.PI*2);
  ctx.ellipse(4-legSwing*0.3,6+bob*0.3,3.6,6.5,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#171310';
  ctx.beginPath();
  ctx.ellipse(-4+legSwing*0.3,12+bob*0.3,3.8,4,0,0,Math.PI*2);
  ctx.ellipse(4-legSwing*0.3,12+bob*0.3,3.8,4,0,0,Math.PI*2);
  ctx.fill();
  // arms
  ctx.fillStyle = '#8a7256';
  ctx.beginPath();
  ctx.ellipse(-8,-1+bob,3,7,0.25,0,Math.PI*2);
  ctx.ellipse(8,-1+bob,3,7,-0.25,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#e8c9a0';
  ctx.beginPath(); ctx.arc(-9.5,5+bob,2.6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9.5,5+bob,2.6,0,Math.PI*2); ctx.fill();
  // torso
  ctx.fillStyle = '#8a7256';
  ctx.beginPath(); ctx.ellipse(0,-4+bob,8,11,0,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle = '#e8c9a0';
  ctx.beginPath(); ctx.arc(0,-17+bob,5.5,0,Math.PI*2); ctx.fill();
  // face: simple worried eyes + mouth
  ctx.fillStyle = '#241a12';
  ctx.beginPath(); ctx.arc(-1.8,-18+bob,0.9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.8,-18+bob,0.9,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#5a3a2a';
  ctx.lineWidth = 0.9;
  ctx.beginPath();
  if(fleeing){ ctx.arc(0,-14.5+bob,1.6,1.1*Math.PI,1.9*Math.PI); } // worried open mouth
  else { ctx.moveTo(-1.6,-14.5+bob); ctx.lineTo(1.6,-14.5+bob); }
  ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(-10,-27,20,3);
  ctx.fillStyle='#7ec25a'; ctx.fillRect(-9.5,-26.5, 19*clamp(o.hp/o.maxHp,0,1),2);
  if(o.carriedItem){
    ctx.font='13px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ITEM_DEFS[o.carriedItem].icon, 0, -36+bob);
  }
  ctx.restore();
}

function drawObstacle(o){
  if(o.type==='building') drawBuilding(o);
  else if(o.type==='tree') drawTree(o);
  else if(o.type==='villager') drawVillager(o);
}

function drawFighterShadow(f){
  const d = dist(f.x,f.y,arena.cx,arena.cy);
  const onPlatform = d < arena.r;
  ctx.save();
  ctx.globalAlpha = onPlatform? 0.4: 0.15;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(f.x, f.y+22, 20, 7, 0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawWeapon(f){
  switch(f.weapon){
    case 'staff':
      ctx.fillStyle='#6b4a2f'; ctx.fillRect(0,-2,46,4);
      ctx.fillStyle=f.accent; ctx.beginPath(); ctx.arc(48,0,6,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.globalAlpha=0.45; ctx.fillStyle=f.accent;
      ctx.beginPath(); ctx.arc(48,0,10,0,Math.PI*2); ctx.fill(); ctx.restore();
      break;
    case 'axe':
      ctx.fillStyle='#cfd6dd'; ctx.fillRect(0,-2,32,4);
      ctx.fillStyle='#3a3a3a'; ctx.fillRect(-6,-4,8,8);
      ctx.fillStyle=f.accent;
      ctx.beginPath(); ctx.moveTo(28,-11); ctx.lineTo(46,0); ctx.lineTo(28,11); ctx.lineTo(22,0); ctx.closePath(); ctx.fill();
      break;
    case 'dagger':
      ctx.fillStyle='#cfd6dd'; ctx.fillRect(0,-2,22,4);
      ctx.fillStyle='#3a3a3a'; ctx.fillRect(-5,-3.5,7,7);
      ctx.fillStyle=f.accent; ctx.beginPath(); ctx.arc(24,0,3,0,Math.PI*2); ctx.fill();
      break;
    case 'excalibur':
      ctx.save();
      ctx.shadowColor = '#ffe9a8'; ctx.shadowBlur = 16;
      ctx.fillStyle = '#f5e6b8'; ctx.fillRect(0,-3,50,6);
      ctx.fillStyle = '#c9a227'; ctx.fillRect(-8,-7,11,14);
      ctx.beginPath(); ctx.moveTo(50,-7); ctx.lineTo(61,0); ctx.lineTo(50,7); ctx.closePath(); ctx.fill();
      ctx.restore();
      break;
    case 'mace':
      ctx.fillStyle='#6b4a2f'; ctx.fillRect(0,-2,32,4);
      ctx.fillStyle='#5a5a5a'; ctx.beginPath(); ctx.arc(38,0,7,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=f.accent; ctx.lineWidth=1.5;
      for(let i=0;i<6;i++){ const a=i/6*Math.PI*2; ctx.beginPath(); ctx.moveTo(38,0); ctx.lineTo(38+Math.cos(a)*9,Math.sin(a)*9); ctx.stroke(); }
      break;
    case 'bow':
      // 弓本体（曲線）
      ctx.strokeStyle = '#6b4a2f'; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(6,-17); ctx.quadraticCurveTo(22,0,6,17);
      ctx.stroke();
      // 弦
      ctx.strokeStyle = 'rgba(240,235,220,.75)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(6,-17); ctx.lineTo(2,0); ctx.lineTo(6,17); ctx.stroke();
      // つがえた矢
      ctx.strokeStyle = '#caa46b'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-4,0); ctx.lineTo(28,0); ctx.stroke();
      ctx.fillStyle = f.accent;
      ctx.beginPath(); ctx.moveTo(28,0); ctx.lineTo(22,-3); ctx.lineTo(22,3); ctx.closePath(); ctx.fill();
      break;
    default:
      ctx.fillStyle = '#cfd6dd'; ctx.fillRect(0,-2.5,42,5);
      ctx.fillStyle='#3a3a3a'; ctx.fillRect(-6,-4,8,8);
      ctx.fillStyle=f.accent; ctx.beginPath(); ctx.arc(44,0,4,0,Math.PI*2); ctx.fill();
  }
}

function drawFighter(f){
  if(!f.alive) return;
  ctx.save();
  ctx.translate(f.x, f.y);
  const flash = (f.state==='hit' && Math.floor(f.animT*30)%2===0);
  const bodyColor = flash? '#ffffff' : f.color;

  if(f.isPlayer){
    ctx.save();
    ctx.globalAlpha = 0.5+Math.sin(f.animT*3)*0.15;
    ctx.strokeStyle='rgba(201,162,39,0.85)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(0,20,22,8,0,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  if(f.blocking){
    ctx.save();
    ctx.globalAlpha = 0.35 + Math.sin(f.animT*10)*0.1;
    ctx.strokeStyle = '#bfe0ff';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,-14, 30, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  if(f.isKiller){
    ctx.save();
    ctx.globalAlpha = 0.55 + Math.sin(f.animT*6)*0.2;
    ctx.strokeStyle = '#c8203a';
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.arc(0,20, 24, 0, Math.PI*2);
    ctx.stroke();
    ctx.font = "13px 'Noto Serif JP', serif";
    ctx.textAlign='center';
    ctx.fillStyle = '#ff5b5b';
    ctx.shadowColor='#000'; ctx.shadowBlur=3;
    ctx.fillText('💀', 0, -72);
    ctx.restore();
  }

  if(f.isHunter){
    ctx.save();
    const pulse = 0.5 + Math.sin(f.animT*8)*0.3;
    ctx.globalAlpha = 0.6+pulse*0.3;
    const g = ctx.createRadialGradient(0,-10,4,0,-10,44);
    g.addColorStop(0, 'rgba(255,26,43,0.35)');
    g.addColorStop(1, 'rgba(255,26,43,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0,-10,44,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = f.accent;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,20, 26+pulse*3, 0, Math.PI*2); ctx.stroke();
    ctx.font = "13px 'Noto Serif JP', serif";
    ctx.textAlign='center';
    ctx.fillStyle = '#ff2a2a';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText('狩', 0, -72);
    ctx.restore();
  }

  if(f.isElf){
    ctx.save();
    const pulse = 0.5 + Math.sin(f.animT*7)*0.3;
    ctx.globalAlpha = 0.5+pulse*0.25;
    const g = ctx.createRadialGradient(0,-10,4,0,-10,40);
    g.addColorStop(0, 'rgba(139,224,138,0.35)');
    g.addColorStop(1, 'rgba(139,224,138,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0,-10,40,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = f.accent;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,20, 24+pulse*3, 0, Math.PI*2); ctx.stroke();
    ctx.font = "13px 'Noto Serif JP', serif";
    ctx.textAlign='center';
    ctx.fillStyle = '#bdf0a0';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText('森', 0, -72);
    ctx.restore();
  }

  if(f.state==='dash'){
    ctx.globalAlpha=0.3;
    ctx.fillStyle=f.accent;
    ctx.beginPath(); ctx.ellipse(-f._dashDirX*18,-f._dashDirY*18-14,16,16,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  const bob = (f.state==='walk')? Math.sin(f.animT*10)*3 : Math.sin(f.animT*2.2)*1.2;

  // horse mount (drawn beneath the rider)
  if(f.mounted){
    ctx.save();
    ctx.globalAlpha=0.95;
    ctx.fillStyle = '#5a3a20';
    // legs
    ctx.fillRect(-20, 16+bob*0.4, 5, 14);
    ctx.fillRect(-7, 18+bob*0.4, 5, 14);
    ctx.fillRect(7, 18+bob*0.4, 5, 14);
    ctx.fillRect(20, 16+bob*0.4, 5, 14);
    // body
    ctx.beginPath(); ctx.ellipse(-f.facing*3, 12+bob*0.4, 24, 13, 0,0,Math.PI*2); ctx.fill();
    // head/neck
    ctx.beginPath(); ctx.ellipse(f.facing*27, 4+bob*0.4, 10, 7, 0,0,Math.PI*2); ctx.fill();
    // mane
    ctx.fillStyle = '#241a10';
    ctx.fillRect(f.facing*21, -4+bob*0.4, 5, 12);
    // tail
    ctx.fillRect(-f.facing*24, 4+bob*0.4, 4, 14);
    ctx.restore();
  }

  // walk animation swing for legs/arms
  const walking = f.state==='walk';
  const legSwing  = walking? Math.sin(f.animT*10)*6      : 0;
  const legSwing2 = walking? Math.sin(f.animT*10+Math.PI)*6 : 0;

  // legs (upper leg / trouser)
  ctx.fillStyle = shadeColor(bodyColor,-42);
  ctx.beginPath();
  ctx.ellipse(-8, 3+bob*0.3+legSwing*0.12, 6.5, 12, 0,0,Math.PI*2);
  ctx.ellipse(8, 3+bob*0.3+legSwing2*0.12, 6.5, 12, 0,0,Math.PI*2);
  ctx.fill();
  // feet (boots)
  ctx.fillStyle = '#171310';
  ctx.beginPath();
  ctx.ellipse(-8+legSwing*0.45, 15+bob*0.3, 6.5, 6, 0,0,Math.PI*2);
  ctx.ellipse(8+legSwing2*0.45, 15+bob*0.3, 6.5, 6, 0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath();
  ctx.ellipse(-8+legSwing*0.45, 15+bob*0.3, 6.5, 6, 0, 0, Math.PI);
  ctx.ellipse(8+legSwing2*0.45, 15+bob*0.3, 6.5, 6, 0, 0, Math.PI);
  ctx.fill();

  // cape/robe
  ctx.fillStyle = shadeColor(bodyColor,-30);
  ctx.beginPath();
  ctx.moveTo(-14,-8+bob);
  ctx.quadraticCurveTo(-20,14, -10, 20);
  ctx.lineTo(10,20);
  ctx.quadraticCurveTo(20,14, 14,-8+bob);
  ctx.closePath();
  ctx.fill();

  // off-hand arm (opposite side from the weapon hand)
  {
    const offSwing = walking? Math.sin(f.animT*10+Math.PI)*0.28 : Math.sin(f.animT*2)*0.09;
    ctx.save();
    ctx.translate(-f.facing*11, -9+bob);
    ctx.rotate(offSwing);
    ctx.fillStyle = shadeColor(bodyColor,-18);
    ctx.beginPath(); ctx.ellipse(0,9,6.2,11,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e8c9a0';
    ctx.beginPath(); ctx.arc(0,19,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // torso
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0,-6+bob,15,18,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,-22+bob); ctx.lineTo(0,10+bob); ctx.stroke();

  // pauldrons
  ctx.fillStyle = shadeColor(f.accent,-10);
  ctx.beginPath(); ctx.arc(-13,-14+bob,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(13,-14+bob,6,0,Math.PI*2); ctx.fill();

  // neck
  ctx.fillStyle = '#d4b48c';
  ctx.fillRect(-4,-23+bob,8,7);

  // head
  ctx.fillStyle = '#e8c9a0';
  ctx.beginPath();
  ctx.arc(0,-30+bob,10,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath(); ctx.ellipse(0,-25+bob,8,4,0,0,Math.PI*2); ctx.fill();

  // face: eyes + mouth (faces the direction the fighter is walking)
  {
    const eyeY = -31+bob;
    const eyeOffsetX = f.facing*1.3;
    const blinking = (Math.floor(performance.now()/180 + f.animT*37)%50===0);
    if(f.state==='hit'){
      ctx.lineWidth=1.3; ctx.strokeStyle='#241a12';
      [-3.6,3.6].forEach(dx=>{
        ctx.beginPath(); ctx.moveTo(dx+eyeOffsetX-1.7,eyeY-1.7); ctx.lineTo(dx+eyeOffsetX+1.7,eyeY+1.7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(dx+eyeOffsetX-1.7,eyeY+1.7); ctx.lineTo(dx+eyeOffsetX+1.7,eyeY-1.7); ctx.stroke();
      });
    } else if(blinking){
      ctx.lineWidth=1.2; ctx.strokeStyle='#241a12';
      ctx.beginPath(); ctx.moveTo(-3.6+eyeOffsetX-1.6,eyeY); ctx.lineTo(-3.6+eyeOffsetX+1.6,eyeY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(3.6+eyeOffsetX-1.6,eyeY); ctx.lineTo(3.6+eyeOffsetX+1.6,eyeY); ctx.stroke();
    } else {
      ctx.fillStyle = '#f5efe2';
      ctx.beginPath(); ctx.ellipse(-3.6+eyeOffsetX,eyeY,2.1,2.4,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(3.6+eyeOffsetX,eyeY,2.1,2.4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#241a12';
      ctx.beginPath(); ctx.arc(-3.6+eyeOffsetX+f.facing*0.4,eyeY,1.1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(3.6+eyeOffsetX+f.facing*0.4,eyeY,1.1,0,Math.PI*2); ctx.fill();
    }
    ctx.strokeStyle = 'rgba(40,28,18,.75)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-5.6+eyeOffsetX,eyeY-3.4); ctx.lineTo(-1.8+eyeOffsetX,eyeY-4.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1.8+eyeOffsetX,eyeY-4.2); ctx.lineTo(5.6+eyeOffsetX,eyeY-3.4); ctx.stroke();
    ctx.strokeStyle = '#5a3a2a';
    ctx.lineWidth = 1.2;
    if(f.state==='attack'){
      ctx.fillStyle = '#4a2016';
      ctx.beginPath(); ctx.ellipse(eyeOffsetX,-25.5+bob,2.6,2.1,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(eyeOffsetX,-26.5+bob,3,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    }
  }

  // hood/hat accent
  ctx.fillStyle = f.accent;
  ctx.beginPath();
  ctx.moveTo(-11,-32+bob);
  ctx.quadraticCurveTo(0,-52+bob,11,-32+bob);
  ctx.quadraticCurveTo(0,-38+bob,-11,-32+bob);
  ctx.fill();

  // weapon arm
  const armPivotX = f.facing*13, armPivotY = -10+bob;
  let swordAngle = f.facing>0? -0.5 : Math.PI+0.5;
  if(f.state==='attack'){
    const t = clamp(f.stateTime/(f.atkWindup+f.atkActive+f.atkRecover),0,1);
    const swing = Math.sin(t*Math.PI) * 2.3;
    swordAngle += f.facing>0? -1.0+swing : 1.0-swing;
  } else {
    swordAngle += Math.sin(f.animT*2)*0.08;
  }
  ctx.save();
  ctx.translate(armPivotX, armPivotY);
  ctx.rotate(swordAngle);
  // upper sleeve connecting shoulder to hand
  ctx.fillStyle = shadeColor(bodyColor,-18);
  ctx.beginPath(); ctx.ellipse(-6,0,9,5.5,0,0,Math.PI*2); ctx.fill();
  drawWeapon(f);
  // gripping hand drawn over the weapon handle
  ctx.fillStyle = '#e8c9a0';
  ctx.beginPath(); ctx.arc(2,0,4.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,.12)';
  ctx.beginPath(); ctx.arc(2,0,4.3,0.15*Math.PI,0.85*Math.PI); ctx.fill();
  ctx.restore();

  // cast glow
  if(f.state==='cast'){
    const t = clamp(f.stateTime/0.42,0,1);
    ctx.save();
    ctx.globalAlpha = 0.8*(1-Math.abs(t-0.5)*1.4);
    ctx.fillStyle = f.accent;
    ctx.beginPath();
    ctx.arc(f.facing*26,-14+bob, 8+t*10, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // nameplate + hp pip
  ctx.save();
  ctx.font = "10px 'Noto Serif JP', serif";
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(-26,-58,52,4);
  ctx.fillStyle = f.isPlayer? '#ffb066' : f.accent;
  ctx.fillRect(-25,-57, 50*clamp(f.hp/f.maxHp,0,1), 2);
  ctx.fillStyle= f.isPlayer? '#ffe9c9':'#d8cdb8';
  ctx.shadowColor='#000'; ctx.shadowBlur=3;
  ctx.fillText(f.name, 0, -64);
  ctx.restore();

  ctx.restore();
}

function shadeColor(hex, amt){
  let c = hex.replace('#','');
  if(c.length===3) c = c.split('').map(x=>x+x).join('');
  let r = parseInt(c.substring(0,2),16);
  let g = parseInt(c.substring(2,4),16);
  let b = parseInt(c.substring(4,6),16);
  r = clamp(r+amt,0,255); g = clamp(g+amt,0,255); b = clamp(b+amt,0,255);
  return `rgb(${r},${g},${b})`;
}

function drawProjectiles(){
  for(const pr of projectiles){
    ctx.save();
    if(pr.isArrow){
      ctx.translate(pr.x, pr.y);
      ctx.rotate(pr.angle||0);
      ctx.strokeStyle = '#caa46b';
      ctx.lineWidth = 2.2;
      ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(7,0); ctx.stroke();
      ctx.fillStyle = pr.color;
      ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(2,-3.2); ctx.lineTo(2,3.2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.65)';
      ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-10,-3.4); ctx.moveTo(-15,0); ctx.lineTo(-10,3.4); ctx.stroke();
    } else {
      ctx.globalAlpha = clamp(pr.life/0.3,0,1)*0.6+0.4;
      const glow = ctx.createRadialGradient(pr.x,pr.y,0,pr.x,pr.y,pr.r*2.2);
      glow.addColorStop(0, pr.color);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(pr.x,pr.y,pr.r*2.2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(pr.x,pr.y,pr.r*0.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

/* ============ HUD update ============ */
function updateHUD(){
  const p = fighters[0];
  if(!p) return;
  // ショップUIが開きっぱなしで残ってしまうケース（試合終了・死亡・家の消失など）を毎フレーム監視して閉じる
  if(shopOpenFor){
    if(!p.alive || matchOver || !fightLive || p.hidingIn!==shopOpenFor || !shopOpenFor.alive){
      closeShopUI();
    }
  }
  let statusIcons = '';
  if(p.hidingIn) statusIcons += ' 🏠';
  if(p.mounted) statusIcons += ' 🐴';
  if(p.hasExcalibur) statusIcons += ' ⚔️';
  if(p.hasHelmet) statusIcons += ' ⛑️';
  if(p.hasShield) statusIcons += ' 🛡️';
  if(p.hasWand) statusIcons += ' 🪄';
  if(p.hasBow) statusIcons += ' 🏹×'+(p.arrowsLeft||0);
  if(p.hasVenom) statusIcons += ' 🧪';
  if(p.allyRef && p.allyRef.alive) statusIcons += ' 👥';
  if(p.poisonTimer>0) statusIcons += ' ☠️';
  if(p.slowTimer>0) statusIcons += championStage? ' 🥶' : ' 💩';
  document.getElementById('p1name').textContent = p.name + statusIcons;
  document.getElementById('p1hp').style.width = (p.hp/p.maxHp*100)+'%';
  document.getElementById('p1mp').style.width = (p.mp/p.maxMp*100)+'%';
  document.getElementById('p1st').style.width = (p.st/p.maxSt*100)+'%';

  const timerEl = document.getElementById('timer');
  if(championStage){
    timerEl.textContent = '決闘';
    timerEl.style.color = 'var(--arcane)';
  } else if(matchTimer<=SAFE_TIME){
    timerEl.textContent = Math.ceil(SAFE_TIME-matchTimer);
    timerEl.style.color = '';
  } else if(arena.r>WORLD_RMIN+1){
    timerEl.textContent = '収縮中';
    timerEl.style.color = 'var(--blood)';
  } else {
    timerEl.textContent = '決戦';
    timerEl.style.color = 'var(--ember)';
  }

  document.getElementById('aliveCount').textContent = championStage? 'CHAMPION' : ('残り '+aliveCount);
  document.getElementById('goldCount').textContent = '💰'+(p.gold||0);

  for(let i=1;i<fighters.length;i++){
    const f = fighters[i];
    const el = document.getElementById('roster-'+i);
    if(!el) continue;
    el.classList.toggle('down', !f.alive);
    const bar = el.querySelector('.rosterBarFill');
    if(bar) bar.style.width = Math.max(0,(f.hp/f.maxHp*100))+'%';
  }

  if(championStage && championRef){
    const bossHpEl = document.getElementById('bossHp');
    if(bossHpEl) bossHpEl.style.width = Math.max(0,(championRef.hp/championRef.maxHp*100))+'%';
  }

  setCd('btnAttack', p.atkCooldown, p.atkCdMax);
  setCd('btnSpell', p.spellCooldown, p.spellCdMax);
  setCd('btnDash', p.dashCooldown, DASH_COOLDOWN);
}
function setCd(id, cur, max){
  const el = document.getElementById(id);
  if(cur>0.02) el.classList.add('cooldown'); else el.classList.remove('cooldown');
}

/* ============ Main loop ============ */
let last = now();
function frame(){
  const t = now();
  let dt = (t-last)/1000;
  last = t;
  dt = Math.min(dt, 0.033);

  if(running){
    updateEmbers(dt);
    updateParticles(dt);

    if(fightLive && !matchOver){
      updateArenaShrink(dt);
      updateHunterWatch(dt);
      computeTargets();
      for(const f of fighters){ if(f.alive && !f.isPlayer) updateAI(f, dt); }
      for(const f of fighters){ if(f.alive) updateFighter(f, dt); }
      resolveCollisions();
      updateObstacles(dt);
      resolveObstacleCollisions();
      updateItems(dt);
      updateProjectiles(dt);
      for(const f of fighters){ checkPitFall(f); }
    }
    updateHUD();
  }

  ctx.clearRect(0,0,W,H);
  if(running){
    updateCamera(dt);
    drawSceneBackground();
    ctx.save();
    ctx.translate(W/2-camera.x, H/2-camera.y);
    drawArenaWorld(t);
    drawItems();
    const drawList = [
      ...fighters.filter(f=>f.alive && !f.hidingIn).map(f=>({y:f.y, isFighter:true, ref:f})),
      ...obstacles.filter(o=>o.alive).map(o=>({y:o.y, isFighter:false, ref:o}))
    ].sort((a,b)=>a.y-b.y);
    for(const d of drawList){ if(d.isFighter) drawFighterShadow(d.ref); else drawObstacleShadow(d.ref); }
    for(const d of drawList){ if(d.isFighter) drawFighter(d.ref); else drawObstacle(d.ref); }
    drawProjectiles();
    drawParticles();
    ctx.restore();
  }

  if(shake>0.1){
    const sx = (Math.random()-0.5)*shake;
    const sy = (Math.random()-0.5)*shake;
    document.getElementById('wrap').style.transform = `translate(${sx}px,${sy}px)`;
    shake *= 0.85;
  } else {
    document.getElementById('wrap').style.transform = 'translate(0,0)';
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

})();
</script>
